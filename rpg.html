<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RPG - HEEEPH</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      background-color: #e6dfd3;
      color: #111;
    }

    header {
      background-color: #111;
      padding: 20px;
      text-align: center;
      border-bottom: 3px solid #c9a227;
    }

    header h1 {
      color: #f0c64c;
      font-size: 28px;
      letter-spacing: 2px;
    }

    .topo-categoria {
      text-align: center;
      padding: 40px 20px 20px;
    }

    .topo-categoria h2 {
      font-size: 34px;
      margin-bottom: 10px;
    }

    .topo-categoria p {
      font-size: 16px;
      color: #333;
      max-width: 750px;
      margin: 0 auto;
      line-height: 1.5;
    }

    .galeria {
      max-width: 1240px;
      margin: 0 auto;
      padding: 30px 20px 60px;
    }

    .grid-placas {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 22px;
    }

    .placa {
      background-color: #f8f4ec;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.12);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      padding: 10px;
    }

    .placa:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.18);
    }

    .placa img {
      width: 100%;
      aspect-ratio: 10 / 14;
      object-fit: cover;
      display: block;
      border-radius: 8px;
      background-color: #d8d1c6;
    }

    .botoes-voltar {
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
      padding: 0 20px 50px;
    }

    .botoes-voltar a {
      display: inline-block;
      background-color: #111;
      color: #f0c64c;
      text-decoration: none;
      padding: 12px 22px;
      border-radius: 999px;
      font-weight: bold;
      font-size: 14px;
      transition: 0.2s ease;
    }

    .botoes-voltar a:hover {
      background-color: #222;
      transform: scale(1.03);
    }

    footer {
      background-color: #111;
      color: #d8c27a;
      text-align: center;
      padding: 18px 20px;
      font-size: 14px;
      border-top: 3px solid #c9a227;
    }

    @media (max-width: 768px) {
      .topo-categoria h2 {
        font-size: 28px;
      }
    }
  </style>
</head>
<body>

  <header>
    <h1>HEEEPH</h1>
  </header>

  <section class="topo-categoria">
    <h2>RPG</h2>
    <p>
      Placas decorativas inspiradas em mundos fantásticos, magia, aventura e imaginação.
      Para quem sabe que toda parede pode esconder uma boa campanha.
    </p>
  </section>

  <section class="galeria">
    <div class="grid-placas">

      <div class="placa"><img src="/placas/rpg/3magos.png" alt="3magos"></div>
      <div class="placa"><img src="/placas/rpg/abobora.png" alt="abobora"></div>
      <div class="placa"><img src="/placas/rpg/adaga.png" alt="adaga"></div>
      <div class="placa"><img src="/placas/rpg/arco.png" alt="arco"></div>

      <div class="placa"><img src="/placas/rpg/espada-gelo.png" alt="espada-gelo"></div>
      <div class="placa"><img src="/placas/rpg/gelo.png" alt="gelo"></div>
      <div class="placa"><img src="/placas/rpg/machado.png" alt="machado"></div>
      <div class="placa"><img src="/placas/rpg/mapa.png" alt="mapa"></div>

      <div class="placa"><img src="/placas/rpg/nature.png" alt="nature"></div>
      <div class="placa"><img src="/placas/rpg/pureza.png" alt="pureza"></div>

    </div>
  </section>

  <div class="botoes-voltar">
    <a href="categorias.html">VOLTAR PARA CATEGORIAS</a>
    <a href="index.html">VOLTAR PARA HOME</a>
  </div>

  <footer>
    <p>© 2026 HEEEPH - Placas Decorativas</p>
  </footer>

</body>
</html>
