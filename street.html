<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Street - HEEEPH</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      background-color: #e6dfd3;
      color: #111;
    }

    header {
      background-color: #111;
      padding: 20px;
      text-align: center;
      border-bottom: 3px solid #c9a227;
    }

    header h1 {
      color: #f0c64c;
      font-size: 28px;
      letter-spacing: 2px;
    }

    .topo-categoria {
      text-align: center;
      padding: 40px 20px 20px;
    }

    .topo-categoria h2 {
      font-size: 34px;
      margin-bottom: 10px;
    }

    .topo-categoria p {
      font-size: 16px;
      color: #333;
      max-width: 750px;
      margin: 0 auto;
      line-height: 1.5;
    }

    .galeria {
      max-width: 1240px;
      margin: 0 auto;
      padding: 30px 20px 60px;
    }

    .grid-placas {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 22px;
    }

    .placa {
      background-color: #f8f4ec;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.12);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      padding: 10px;
    }

    .placa:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.18);
    }

    .placa img {
      width: 100%;
      aspect-ratio: 10 / 14;
      object-fit: cover;
      display: block;
      border-radius: 8px;
      background-color: #d8d1c6;
    }

    .botoes-voltar {
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
      padding: 0 20px 50px;
    }

    .botoes-voltar a {
      display: inline-block;
      background-color: #111;
      color: #f0c64c;
      text-decoration: none;
      padding: 12px 22px;
      border-radius: 999px;
      font-weight: bold;
      font-size: 14px;
      transition: 0.2s ease;
    }

    .botoes-voltar a:hover {
      background-color: #222;
      transform: scale(1.03);
    }

    footer {
      background-color: #111;
      color: #d8c27a;
      text-align: center;
      padding: 18px 20px;
      font-size: 14px;
      border-top: 3px solid #c9a227;
    }

    @media (max-width: 768px) {
      .topo-categoria h2 {
        font-size: 28px;
      }
    }
  </style>
</head>
<body>

  <header>
    <h1>HEEEPH</h1>
  </header>

  <section class="topo-categoria">
    <h2>Street</h2>
    <p>
      Placas decorativas com alma urbana, skate, rua, atitude e expressão.
      Feitas para quem gosta de estética de cidade, concreto, spray e liberdade.
    </p>
  </section>

  <section class="galeria">
    <div class="grid-placas">

      <div class="placa"><img src="/placas/street/chao.png" alt="chao"></div>
      <div class="placa"><img src="/placas/street/hh-h.png" alt="hh-h"></div>
      <div class="placa"><img src="/placas/street/hh-m.png" alt="hh-m"></div>
      <div class="placa"><img src="/placas/street/jacketa.png" alt="jacketa"></div>

      <div class="placa"><img src="/placas/street/naipess.png" alt="naipess"></div>
      <div class="placa"><img src="/placas/street/naopedelicença.png" alt="naopedelicença"></div>
      <div class="placa"><img src="/placas/street/paz-spray.png" alt="paz-spray"></div>
      <div class="placa"><img src="/placas/street/role-sem-fim.png" alt="role-sem-fim"></div>

      <div class="placa"><img src="/placas/street/skate1.png" alt="skate1"></div>
      <div class="placa"><img src="/placas/street/skate2.png" alt="skate2"></div>
      <div class="placa"><img src="/placas/street/skate3.png" alt="skate3"></div>
      <div class="placa"><img src="/placas/street/skateh.png" alt="skateh"></div>

      <div class="placa"><img src="/placas/street/skatem.png" alt="skatem"></div>
      <div class="placa"><img src="/placas/street/skatista.png" alt="skatista"></div>
      <div class="placa"><img src="/placas/street/som.png" alt="som"></div>
      <div class="placa"><img src="/placas/street/voz.png" alt="voz"></div>

      <div class="placa"><img src="/placas/street/zap-mineiro.png" alt="zap-mineiro"></div>

    </div>
  </section>

  <div class="botoes-voltar">
    <a href="categorias.html">VOLTAR PARA CATEGORIAS</a>
    <a href="index.html">VOLTAR PARA HOME</a>
  </div>

  <footer>
    <p>© 2026 HEEEPH - Placas Decorativas</p>
  </footer>

</body>
</html>
