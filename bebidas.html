<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bebidas | Heeeph</title>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #000;
      color: #fff;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    .topbar {
      background: #050505;
      border-bottom: 2px solid #1a1a1a;
      padding: 12px;
      position: sticky;
      top: 0;
      z-index: 999;
    }

    .menu {
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
      font-size: 14px;
      text-transform: uppercase;
    }

    .menu a:hover {
      color: #f0d000;
    }

    .titulo {
      text-align: center;
      margin: 30px 0;
      font-size: 32px;
      color: #f0db35;
    }

    .grid {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
    }

    .card {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 260px;
      padding: 10px;
    }

    .card img {
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      object-fit: contain;
      border-radius: 10px;
      border: 2px solid #fff;
      display: block;
    }

    .zap {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 120px;
      z-index: 999;
    }

    .zap img {
      width: 100%;
      display: block;
    }

    footer {
      text-align: center;
      padding: 20px;
      color: #aaa;
      border-top: 1px solid #111;
      margin-top: 30px;
    }

    @media (max-width: 900px) {
      .grid {
        grid-template-columns: repeat(3, 1fr);
      }

      .zap {
        width: 80px;
      }
    }

    @media (max-width: 600px) {
      .grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .card {
        height: 160px;
      }

      .zap {
        width: 60px;
        bottom: 15px;
        right: 15px;
      }
    }
  </style>
</head>

<body>

  <header class="topbar">
    <nav class="menu">
      <a href="index.html">Home</a>
      <a href="categorias.html">Coleção</a>
      <a href="sobre.html">Sobre</a>
      <a href="#">Contato</a>
    </nav>
  </header>

  <h1 class="titulo">Bebidas</h1>

  <section class="grid">
    <div class="card">
      <img src="placas/Meditando.png" alt="Placa Bebidas 1" draggable="false">
    </div>

    <div class="card">
      <img src="placas/Velho demais para parar.png" alt="Placa Bebidas 2" draggable="false">
    </div>

    <div class="card">
      <img src="placas/Vinil derretido" alt="Placa Bebidas 3" draggable="false">
    </div>

    <div class="card">
      <img src="placas/A Ferrugem não Mata a Alma.png" alt="Placa Bebidas 4" draggable="false">
    </div>
  </section>

  <footer>
    © 2026 Heeeph
  </footer>

  <a href="https://wa.me/5511998302901" target="_blank" class="zap">
    <img src="botoes/Whatsapp.png" alt="WhatsApp">
  </a>

  <script>
    document.addEventListener("contextmenu", function(e) {
      e.preventDefault();
    });
  </script>

</body>
</html>
