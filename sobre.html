<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sobre | Heeeph</title>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #000;
      color: #fff;
      text-align: center;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    .topbar {
      background: #050505;
      border-bottom: 2px solid #1a1a1a;
      padding: 12px;
      position: sticky;
      top: 0;
      z-index: 999;
    }

    .menu {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      font-size: 14px;
      text-transform: uppercase;
    }

    .menu a:hover {
      color: #f0d000;
    }

    .container {
      width: 100%;
      max-width: 1100px;
      margin: 30px auto;
      padding: 0 20px 40px;
    }

    .container img {
      width: 100%;
      max-width: 900px;
      height: auto;
      display: block;
      margin: 0 auto;
      border-radius: 12px;
    }

    .voltar {
      margin-top: 30px;
      display: inline-block;
      padding: 12px 22px;
      border: 2px solid #f0d000;
      border-radius: 999px;
      color: #fff000;
      font-weight: bold;
    }

    .zap {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 80px;
      z-index: 999;
    }

    .zap img {
      width: 100%;
      display: block;
    }

    footer {
      margin-top: 20px;
      padding: 20px;
      color: #aaa;
      border-top: 1px solid #111;
    }

    @media (max-width: 600px) {
      .menu {
        font-size: 12px;
        gap: 8px;
      }

      .zap {
        width: 58px;
        bottom: 15px;
        right: 15px;
      }
    }
  </style>
</head>

<body>

  <header class="topbar">
    <nav class="menu">
  <a href="index.html">Home</a>
  <a href="categorias.html">Coleção</a>
  <a href="sobre.html" class="menu-sobre">
    <img src="Sobre.png" alt="Sobre">
  </a>
  <a href="#">Contato</a>
</nav>
  </header>

  <div class="container">
    <img src="/Sobre.png" alt="Sobre a Heeeph">
    <a class="voltar" href="index.html">Voltar para Home</a>
  </div>

  <footer>
    © 2026 Heeeph
  </footer>

  <a href="https://wa.me/5511998302901" target="_blank" class="zap">
    <img src="/botoes/Whatsapp.png" alt="WhatsApp">
  </a>

</body>
</html>
