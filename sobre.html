<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>O QUE É HEEEPH? - HEEEPH</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --preto: #050505;
      --dourado: #f0c400;
      --bege: #dcd4c6;
      --branco: #ffffff;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #000;
      color: var(--branco);
      overflow-x: hidden;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    img {
      max-width: 100%;
      display: block;
    }

    .topo {
      position: sticky;
      top: 0;
      z-index: 1000;
      width: 100%;
      background: #000;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .topo .wrap {
      max-width: 1600px;
      margin: 0 auto;
      padding: 16px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .logo a {
      font-size: 34px;
      font-weight: 900;
      letter-spacing: 2px;
      color: #fff;
      white-space: nowrap;
    }

    .menu-area {
      display: flex;
      align-items: center;
      gap: 28px;
      margin-left: auto;
    }

    .menu {
      display: flex;
      align-items: center;
      gap: 34px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .menu a {
      color: #fff;
      font-size: 16px;
      font-weight: 800;
      text-transform: uppercase;
      transition: 0.2s ease;
      white-space: nowrap;
    }

    .menu a:hover,
    .menu a.ativo {
      color: var(--dourado);
    }

    .cart-link {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 42px;
      height: 42px;
      flex-shrink: 0;
    }

    .cart-link img {
      width: 28px;
      height: 28px;
      object-fit: contain;
    }

    .cart-count {
      position: absolute;
      top: -5px;
      right: -6px;
      min-width: 20px;
      height: 20px;
      padding: 0 5px;
      border-radius: 999px;
      background: var(--dourado);
      color: #000;
      font-size: 12px;
      font-weight: 900;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 3px 10px rgba(0,0,0,0.25);
    }

    .site-bg {
      min-height: calc(100vh - 92px);
      background:
        linear-gradient(rgba(0,0,0,0.08), rgba(0,0,0,0.08)),
        url("banner/quem-somos.png") center top / contain no-repeat,
        #000;
      padding: 20px 0 40px;
    }

    footer {
      background: #000;
      color: #fff;
      text-align: center;
      padding: 26px 15px;
      font-size: 17px;
      border-top: 1px solid rgba(255,255,255,0.08);
    }

    .whatsapp-fixo {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 999;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .whatsapp-fixo img {
      width: 250px;
      max-width: 250px;
      height: auto;
      display: block;
    }

    @media (max-width: 980px) {
      .topo .wrap {
        flex-direction: column;
        align-items: center;
        gap: 14px;
      }

      .menu-area {
        width: 100%;
        justify-content: center;
        margin-left: 0;
        gap: 18px;
      }

      .menu {
        gap: 18px;
      }

      .whatsapp-fixo img {
        width: 220px;
        max-width: 220px;
      }
    }

    @media (max-width: 700px) {
      .topo .wrap {
        flex-direction: row;
        align-items: center;
        justify-content: space-between;
        gap: 6px;
        padding: 10px 8px;
        flex-wrap: nowrap;
      }

      .logo a {
        font-size: 18px;
        letter-spacing: 1px;
      }

      .menu-area {
        width: auto;
        justify-content: flex-end;
        margin-left: auto;
        gap: 6px;
        flex-wrap: nowrap;
        min-width: 0;
        flex: 1 1 auto;
      }

      .menu {
        gap: 6px;
        flex-wrap: nowrap;
        justify-content: flex-end;
        overflow: hidden;
      }

      .menu a {
        font-size: 8px;
        letter-spacing: 0;
      }

      .cart-link {
        width: 30px;
        height: 30px;
      }

      .cart-link img {
        width: 21px;
        height: 21px;
      }

      .cart-count {
        top: -2px;
        right: -2px;
        min-width: 14px;
        height: 14px;
        font-size: 8px;
        padding: 0 4px;
      }

      .site-bg {
        min-height: auto;
        background:
          linear-gradient(rgba(0,0,0,0.08), rgba(0,0,0,0.08)),
          url("banner/quem-somos.png") center top / contain no-repeat,
          #000;
        padding: 14px 0 24px;
      }

      .whatsapp-fixo {
        right: 10px;
        bottom: 10px;
      }

      .whatsapp-fixo img {
        width: 190px;
        max-width: 190px;
      }

      footer {
        font-size: 14px;
        padding: 18px 12px;
      }
    }
  </style>
</head>
<body>

  <header class="topo">
    <div class="wrap">
      <div class="logo">
        <a href="index.html">HEEEPH</a>
      </div>

      <div class="menu-area">
        <nav class="menu">
          <a href="index.html">HOME</a>
          <a href="categorias.html">COLEÇÃO</a>
          <a href="sobre.html" class="ativo">O QUE É HEEEPH?</a>
          <a href="fotos-reais.html">FOTOS REAIS</a>
          <a href="contatos.html">CONTATOS</a>
        </nav>

        <a href="carrinho.html" class="cart-link" aria-label="Abrir carrinho">
          <img src="botoes/botao-carrinho.png" alt="Carrinho">
          <span class="cart-count" id="cartCount">0</span>
        </a>
      </div>
    </div>
  </header>

  <main class="site-bg"></main>

  <footer>
    © 2026 HEEEPH - Placas Decorativas
  </footer>

  <a class="whatsapp-fixo" href="https://wa.me/5511998302901" target="_blank" rel="noopener noreferrer" aria-label="Falar no WhatsApp">
    <img src="botoes/whatsapp.png" alt="WhatsApp HEEEPH">
  </a>

  <script>
    function getCart() {
      return JSON.parse(localStorage.getItem('heeeph_cart')) || [];
    }

    function updateCartCount() {
      const cart = getCart();
      const total = cart.reduce((acc, item) => acc + (item.quantity || 1), 0);
      const countEl = document.getElementById('cartCount');
      if (countEl) countEl.textContent = total;
    }

    updateCartCount();
  </script>

</body>
</html>
