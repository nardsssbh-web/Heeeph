<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Heeeph</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #000;
      color: #fff;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    /* TOPO FIXO */
    .topbar {
      background: #050505;
      border-bottom: 2px solid #1a1a1a;
      padding: 12px;
      position: sticky;
      top: 0;
      z-index: 999;
    }

    .menu {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      font-size: 14px;
      text-transform: uppercase;
    }

    .menu a:hover {
      color: #f0d000;
    }

    /* BANNER PRINCIPAL */
    .hero {
      width: 100%;
      max-width: 1350px;
      margin: 0 auto;
    }

    .hero img {
      width: 100%;
      display: block;
    }

    /* BANNER MEDIDAS */
    .banner-secundario {
      display: flex;
      justify-content: center;
      margin-top: 6px;
    }

    .banner-secundario img {
      width: 100%;
      max-width: 1350px;
      max-height: 150px;
      object-fit: contain;
      display: block;
    }

    /* DESTAQUE */
    .section {
      padding: 40px 20px;
      text-align: center;
      background: #000;
    }

    .section h2 {
      font-size: 36px;
      color: #f0db35;
      margin-bottom: 30px;
    }

    .destaque-carousel {
      max-width: 1000px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 80px 1fr 80px;
      align-items: center;
    }

    .seta {
      font-size: 1000px;
      cursor: pointer;
      user-select: none;
    }

    .carousel-palco {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
    }

    .mini-card {
      transition: 0.3s;
      opacity: 0.6;
    }

    .mini-card img {
      width: 180px;
      border: 2px solid #fff;
      border-radius: 8px;
      display: block;
    }

    .centro {
      transform: scale(1.2);
      opacity: 1;
      z-index: 2;
    }

    .centro img {
      width: 260px;
    }

    /* BOTÃO CATEGORIAS */
    .categorias {
      text-align: center;
      padding: 30px;
    }

    .categorias img {
      max-width: 400px;
      width: 100%;
      display: inline-block;
    }

    /* WHATSAPP */
    .zap {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 220px;
      z-index: 999;
    }

    .zap img {
      width: 100%;
      display: block;
    }

    footer {
      text-align: center;
      padding: 20px;
      color: #aaa;
      border-top: 1px solid #111;
    }

    @media (max-width: 900px) {
      .banner-secundario img {
        max-height: 110px;
      }

      .destaque-carousel {
        grid-template-columns: 50px 1fr 50px;
      }

      .mini-card img {
        width: 130px;
      }

      .centro img {
        width: 190px;
      }

      .categorias img {
        max-width: 340px;
      }

      .zap {
        width: 70px;
      }
    }

    @media (max-width: 600px) {
      .menu {
        font-size: 12px;
        gap: 8px;
      }

      .banner-secundario img {
        max-height: 90px;
      }

      .section h2 {
        font-size: 30px;
      }

      .destaque-carousel {
        grid-template-columns: 1fr;
      }

      .seta {
        display: none;
      }

      .carousel-palco {
        gap: 10px;
      }

      .mini-card img {
        width: 90px;
      }

      .centro img {
        width: 140px;
      }

      .categorias img {
        max-width: 260px;
      }

      .zap {
        width: 58px;
        bottom: 15px;
        right: 15px;
      }
    }
  </style>
</head>

<body>

  <header class="topbar">
    <nav class="menu">
      <a href="index.html">Home</a>
      <a href="categorias.html">Coleção</a>
      <a href="sobre.html">Sobre</a>
      <a href="#">Contato</a>
    </nav>
  </header>

  <section class="hero">
    <img src="Banner Principal.png" alt="Banner Principal">
  </section>

  <section class="banner-secundario">
    <img src="banner/Banner-Medidas.png" alt="Banner Medidas">
  </section>

  <section class="section">
    <h2>Destaque</h2>

    <div class="destaque-carousel">
      <div class="seta" onclick="voltar()">‹</div>

      <div class="carousel-palco">
        <div class="mini-card">
          <img id="img-esquerda" alt="Placa esquerda">
        </div>

        <div class="mini-card centro">
          <img id="img-centro" alt="Placa destaque">
        </div>

        <div class="mini-card">
          <img id="img-direita" alt="Placa direita">
        </div>
      </div>

      <div class="seta" onclick="avancar()">›</div>
    </div>
  </section>

  <section class="categorias">
    <a href="categorias.html">
      <img src="botoes/Acesse-Categorias.png" alt="Acesse Categorias">
    </a>
  </section>

  <footer>
    © 2026 Heeeph
  </footer>

  <script>
    const placas = [
      "placas/Placa Skatista.png",
      "placas/Placa roblox.png",
      "placas/Placas Naipes.png",
      "placas/Placa GTA.png"
    ];

    let i = 0;

    function atualizar() {
      document.getElementById("img-centro").src = placas[i];
      document.getElementById("img-esquerda").src =
        placas[(i - 1 + placas.length) % placas.length];
      document.getElementById("img-direita").src =
        placas[(i + 1) % placas.length];
    }

    function avancar() {
      i = (i + 1) % placas.length;
      atualizar();
    }

    function voltar() {
      i = (i - 1 + placas.length) % placas.length;
      atualizar();
    }

    atualizar();
  </script>

  <a href="https://wa.me/5511998302901" target="_blank" class="zap">
    <img src="botoes/Whatsapp.png" alt="WhatsApp">
  </a>

</body>
</html>
