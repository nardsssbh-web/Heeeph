<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HEEEPH - Placas Decorativas</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --preto: #050505;
      --preto-suave: #111111;
      --dourado: #f0c400;
      --dourado-forte: #ffd700;
      --bege: #dcd4c6;
      --branco: #ffffff;
      --cinza: #cfcfcf;
      --sombra: rgba(0, 0, 0, 0.35);
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bege);
      color: var(--branco);
      overflow-x: hidden;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    img {
      max-width: 100%;
      display: block;
    }

    /* TOPO */
    .topo {
      position: sticky;
      top: 0;
      z-index: 1000;
      width: 100%;
      background: #000;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .topo .wrap {
      max-width: 1600px;
      margin: 0 auto;
      padding: 16px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .logo a {
      font-size: 34px;
      font-weight: 900;
      letter-spacing: 2px;
      color: #fff;
      white-space: nowrap;
    }

    .menu-area {
      display: flex;
      align-items: center;
      gap: 28px;
      margin-left: auto;
    }

    .menu {
      display: flex;
      align-items: center;
      gap: 34px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .menu a {
      color: #fff;
      font-size: 16px;
      font-weight: 800;
      text-transform: uppercase;
      transition: 0.2s ease;
      white-space: nowrap;
    }

    .menu a:hover,
    .menu a.ativo {
      color: var(--dourado);
    }

    .cart-link {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 42px;
      height: 42px;
      flex-shrink: 0;
    }

    .cart-link img {
      width: 28px;
      height: 28px;
      object-fit: contain;
    }

    .cart-count {
      position: absolute;
      top: -5px;
      right: -6px;
      min-width: 20px;
      height: 20px;
      padding: 0 5px;
      border-radius: 999px;
      background: var(--dourado);
      color: #000;
      font-size: 12px;
      font-weight: 900;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 3px 10px rgba(0,0,0,0.25);
    }

    /* CONTEÚDO */
    .site-bg {
      background: linear-gradient(to bottom, #0f0f0f 0%, #1c1c1c 100%);
      min-height: 100vh;
      padding-bottom: 80px;
    }

    .container {
      width: min(94%, 1500px);
      margin: 0 auto;
    }

    .hero {
      padding-top: 28px;
    }

    .banner-principal {
      width: 100%;
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 12px 30px rgba(0,0,0,0.25);
    }

    .banner-principal img {
      width: 100%;
      height: auto;
      display: block;
    }

    .banner-secundario {
      width: 86%;
      max-width: 1280px;
      margin: 22px auto 0;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 12px 30px rgba(0,0,0,0.25);
    }

    .banner-secundario img {
      width: 100%;
      height: auto;
      display: block;
    }

    .destaque {
      padding: 55px 0 30px;
    }

    .destaque h2 {
      text-align: center;
      font-size: 32px;
      color: #fff;
      margin-bottom: 28px;
      font-weight: 800;
    }

    .carousel-wrap {
      display: grid;
      grid-template-columns: 90px 1fr 90px;
      align-items: center;
      gap: 20px;
      max-width: 1180px;
      margin: 0 auto;
    }

    .carousel-btn {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: none;
      background: #d9a62a;
      color: #000;
      font-size: 34px;
      font-weight: 900;
      cursor: pointer;
      margin: 0 auto;
      transition: transform 0.2s ease, filter 0.2s ease;
      box-shadow: 0 8px 18px rgba(0,0,0,0.25);
    }

    .carousel-btn:hover {
      transform: scale(1.06);
      filter: brightness(1.05);
    }

    .carousel-track {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 36px;
      min-height: 430px;
    }

    .destaque-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: 0.25s ease;
    }

    .destaque-card button {
      background: none;
      border: none;
      cursor: pointer;
    }

    .destaque-card img {
      display: block;
      border-radius: 18px;
      object-fit: cover;
      box-shadow: 0 10px 28px rgba(0,0,0,0.35);
      border: 2px solid rgba(255, 208, 0, 0.15);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .destaque-card button:hover img {
      transform: translateY(-4px);
      box-shadow: 0 16px 32px rgba(0,0,0,0.42);
    }

    .destaque-card.side img {
      width: 180px;
      height: 255px;
    }

    .destaque-card.center img {
      width: 340px;
      height: 480px;
    }

    .destaque-info {
      text-align: center;
      margin-top: 12px;
    }

    .destaque-info h3 {
      font-size: 18px;
      color: #fff;
      margin-bottom: 4px;
    }

    .destaque-info p {
      font-size: 18px;
      color: var(--dourado);
      font-weight: 800;
    }

    .botao-categorias {
      display: flex;
      justify-content: center;
      margin-top: 30px;
    }

    .botao-categorias a {
      display: inline-block;
      transition: transform 0.2s ease;
    }

    .botao-categorias a:hover {
      transform: scale(1.02);
    }

    .botao-categorias img {
      width: min(100%, 520px);
      height: auto;
    }

    .faixa-clara {
      background: var(--bege);
      min-height: 320px;
      margin-top: 45px;
    }

    footer {
      background: #000;
      color: #fff;
      text-align: center;
      padding: 26px 15px;
      font-size: 17px;
    }

    /* WHATSAPP */
    .whatsapp-fixo {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 999;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .whatsapp-fixo img {
      width: 250px;
      max-width: 250px;
      height: auto;
      display: block;
    }

    /* RESPONSIVO */
    @media (max-width: 1200px) {
      .menu {
        gap: 22px;
      }

      .destaque-card.center img {
        width: 280px;
        height: 400px;
      }

      .destaque-card.side img {
        width: 150px;
        height: 215px;
      }
    }

    @media (max-width: 980px) {
      .topo .wrap {
        flex-direction: column;
        align-items: center;
        gap: 14px;
      }

      .menu-area {
        width: 100%;
        justify-content: center;
        margin-left: 0;
        gap: 18px;
      }

      .menu {
        gap: 18px;
      }

      .carousel-wrap {
        grid-template-columns: 70px 1fr 70px;
        gap: 8px;
      }

      .carousel-track {
        gap: 18px;
      }

      .destaque-card.center img {
        width: 230px;
        height: 330px;
      }

      .destaque-card.side img {
        width: 120px;
        height: 170px;
      }

      .whatsapp-fixo img {
        width: 220px;
        max-width: 220px;
      }
    }

    @media (max-width: 700px) {
      .logo a {
        font-size: 28px;
      }

      .menu {
        gap: 14px;
      }

      .menu a {
        font-size: 14px;
      }

      .banner-secundario {
        width: 94%;
      }

      .destaque h2 {
        font-size: 28px;
      }

      .carousel-wrap {
        grid-template-columns: 56px 1fr 56px;
      }

      .carousel-btn {
        width: 48px;
        height: 48px;
        font-size: 24px;
      }

      .carousel-track {
        gap: 10px;
        min-height: 320px;
      }

      .destaque-card.side {
        display: none;
      }

      .destaque-card.center img {
        width: 220px;
        height: 310px;
      }

      .whatsapp-fixo {
        right: 10px;
        bottom: 10px;
      }

      .whatsapp-fixo img {
        width: 190px;
        max-width: 190px;
      }
    }
  </style>
</head>
<body>

  <header class="topo">
    <div class="wrap">
      <div class="logo">
        <a href="index.html">HEEEPH</a>
      </div>

      <div class="menu-area">
        <nav class="menu">
          <a href="index.html" class="ativo">HOME</a>
          <a href="categorias.html">COLEÇÃO</a>
          <a href="sobre.html">O QUE É HEEEPH?</a>
          <a href="fotos-reais.html">FOTOS REAIS</a>
          <a href="contatos.html">CONTATOS</a>
        </nav>

        <a href="carrinho.html" class="cart-link" aria-label="Abrir carrinho">
          <img src="botoes/botao-carrinho.png" alt="Carrinho">
          <span class="cart-count" id="cartCount">0</span>
        </a>
      </div>
    </div>
  </header>

  <main class="site-bg">
    <section class="hero">
      <div class="container">
        <div class="banner-principal">
          <img src="banner/banner-principal.png" alt="Banner principal HEEEPH">
        </div>

        <div class="banner-secundario">
          <img src="banner/banner-medidas.png" alt="Medidas das placas decorativas">
        </div>
      </div>
    </section>

    <section class="destaque">
      <div class="container">
        <h2>Destaque</h2>

        <div class="carousel-wrap">
          <button class="carousel-btn" id="prevBtn" aria-label="Anterior">&#8249;</button>

          <div class="carousel-track" id="carouselTrack"></div>

          <button class="carousel-btn" id="nextBtn" aria-label="Próximo">&#8250;</button>
        </div>

        <div class="botao-categorias">
          <a href="categorias.html">
            <img src="botoes/categorias.png" alt="Categorias">
          </a>
        </div>
      </div>
    </section>

    <div class="faixa-clara"></div>
  </main>

  <footer>
    © 2026 HEEEPH - Placas Decorativas
  </footer>

  <a class="whatsapp-fixo" href="https://wa.me/5511998302901" target="_blank" rel="noopener noreferrer" aria-label="Falar no WhatsApp">
    <img src="botoes/whatsapp.png" alt="WhatsApp HEEEPH">
  </a>

  <script>
    function getCart() {
      return JSON.parse(localStorage.getItem('heeeph_cart')) || [];
    }

    function saveCart(cart) {
      localStorage.setItem('heeeph_cart', JSON.stringify(cart));
      updateCartCount();
    }

    function updateCartCount() {
      const cart = getCart();
      const total = cart.reduce((acc, item) => acc + (item.quantity || 1), 0);
      const countEl = document.getElementById('cartCount');
      if (countEl) countEl.textContent = total;
    }

    function addToCart(item) {
      const cart = getCart();
      const existingIndex = cart.findIndex(cartItem => cartItem.id === item.id);

      if (existingIndex > -1) {
        cart[existingIndex].quantity += 1;
      } else {
        cart.push({
          ...item,
          quantity: 1
        });
      }

      saveCart(cart);
      window.location.href = 'carrinho.html';
    }

    updateCartCount();

    const produtosDestaque = [
      {
        id: 'destaque-skatista',
        nome: 'Placa Skatista',
        preco: 'preço aqui',
        imagem: 'placas/street/skatista.png'
      },
      {
        id: 'destaque-naipes',
        nome: 'Placa Naipes',
        preco: 'preço aqui',
        imagem: 'placas/street/naipes.png'
      },
      {
        id: 'destaque-gta-sa',
        nome: 'Placa GTA SA',
        preco: 'preço aqui',
        imagem: 'placas/games/gta-sa.png'
      },
      {
        id: 'destaque-velho',
        nome: 'Placa Velho',
        preco: 'preço aqui',
        imagem: 'placas/motos/velho.png'
      },
      {
        id: 'destaque-beleza',
        nome: 'Placa Beleza',
        preco: 'preço aqui',
        imagem: 'placas/home-frases/beleza.png'
      }
    ];

    let currentIndex = 1;

    function renderCarousel() {
      const track = document.getElementById('carouselTrack');
      track.innerHTML = '';

      const total = produtosDestaque.length;
      const prevIndex = (currentIndex - 1 + total) % total;
      const nextIndex = (currentIndex + 1) % total;

      const itens = [
        { ...produtosDestaque[prevIndex], classe: 'side' },
        { ...produtosDestaque[currentIndex], classe: 'center' },
        { ...produtosDestaque[nextIndex], classe: 'side' }
      ];

      itens.forEach(produto => {
        const card = document.createElement('div');
        card.className = `destaque-card ${produto.classe}`;

        const button = document.createElement('button');
        button.type = 'button';
        button.addEventListener('click', () => addToCart(produto));

        const img = document.createElement('img');
        img.src = produto.imagem;
        img.alt = produto.nome;

        const info = document.createElement('div');
        info.className = 'destaque-info';
        info.innerHTML = `
          <h3>${produto.nome}</h3>
          <p>${produto.preco}</p>
        `;

        button.appendChild(img);
        card.appendChild(button);
        card.appendChild(info);
        track.appendChild(card);
      });
    }

    document.getElementById('prevBtn').addEventListener('click', () => {
      currentIndex = (currentIndex - 1 + produtosDestaque.length) % produtosDestaque.length;
      renderCarousel();
    });

    document.getElementById('nextBtn').addEventListener('click', () => {
      currentIndex = (currentIndex + 1) % produtosDestaque.length;
      renderCarousel();
    });

    renderCarousel();
  </script>

</body>
</html>
