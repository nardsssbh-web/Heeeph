<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Heeeph</title>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #000;
      color: #fff;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    /* MENU */
    .topbar {
      background: #050505;
      border-bottom: 2px solid #1a1a1a;
      padding: 12px;
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .menu {
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
      font-size: 14px;
      text-transform: uppercase;
    }

    .menu a:hover {
      color: #f0d000;
    }

    /* BANNER PRINCIPAL */
    .hero {
      width: 100%;
      max-width: 1350px;
      margin: 0 auto;
    }

    .hero img {
      width: 100%;
      display: block;
    }

    /* BANNER MEDIDAS */
    .banner-secundario {
      display: flex;
      justify-content: center;
      margin-top: 6px;
    }

    .banner-secundario img {
      width: 100%;
      max-width: 1350px;
      max-height: 150px;
      object-fit: contain;
    }

    /* DESTAQUE */
    .section {
      padding: 40px 20px;
      text-align: center;
    }

    .section h2 {
      font-size: 36px;
      color: #f0db35;
      margin-bottom: 30px;
    }

    .carousel {
      display: flex;
      justify-content: center;
      gap: 20px;
    }

    .card img {
      width: 180px;
      border: 2px solid #fff;
      border-radius: 8px;
    }

    .centro img {
      width: 260px;
    }

    /* BOTÃO CATEGORIAS */
    .categorias {
      text-align: center;
      padding: 30px;
    }

    .categorias img {
      max-width: 400px;
      width: 100%;
    }

    /* WHATSAPP */
    .zap {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 80px;
    }

    .zap img {
      width: 100%;
    }

    footer {
      text-align: center;
      padding: 20px;
      color: #aaa;
      border-top: 1px solid #111;
    }

    @media (max-width: 600px) {
      .carousel {
        flex-direction: row;
        gap: 10px;
      }

      .card img {
        width: 100px;
      }

      .centro img {
        width: 140px;
      }

      .zap {
        width: 60px;
      }
    }
  </style>
</head>

<body>

  <!-- MENU -->
  <header class="topbar">
    <nav class="menu">
      <a href="index.html">Home</a>
      <a href="HTML/categorias.html">Coleção</a>
      <a href="HTML/sobre.html">Sobre</a>
      <a href="#">Contato</a>
    </nav>
  </header>

  <!-- BANNER PRINCIPAL -->
  <section class="hero">
 <img src="banner/banner-principal.png" alt="Banner Principal">
  </section>

  <!-- BANNER MEDIDAS -->
  <section class="banner-secundario">
    <img src="banner/Banner-Medidas.png" alt="Banner Medidas">
  </section>

  <!-- DESTAQUE -->
  <section class="section">
    <h2>Destaque</h2>

    <div class="carousel">
      <div class="card">
        <img src="placas/Placa Skatista.png">
      </div>

      <div class="card centro">
        <img src="placas/Placa GTA.png">
      </div>

      <div class="card">
        <img src="placas/Placa roblox.png">
      </div>
    </div>
  </section>

  <!-- BOTÃO CATEGORIAS -->
  <section class="categorias">
    <a href="HTML/categorias.html">
      <img src="botoes/Acesse-Categorias.png">
    </a>
  </section>

  <footer>
    © 2026 Heeeph
  </footer>

  <!-- WHATSAPP -->
  <a href="https://wa.me/5511998302901" target="_blank" class="zap">
    <img src="botoes/Whatsapp.png">
  </a>

</body>
</html>
