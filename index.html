<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Categorias | Heeeph</title>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #000;
      color: #fff;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    .topbar {
      background: #050505;
      border-bottom: 2px solid #1a1a1a;
      padding: 12px 18px;
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .menu {
      display: flex;
      gap: 14px;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      font-size: 14px;
      text-transform: uppercase;
    }

    .menu a:hover {
      color: #f0d000;
    }

    .cart {
      border: 2px solid #c00;
      background: linear-gradient(180deg, #d40000, #820000);
      padding: 4px 8px;
      border-radius: 6px;
      font-weight: bold;
    }

    .page-header {
      text-align: center;
      padding: 40px 20px 10px;
    }

    .page-header h1 {
      font-size: clamp(40px, 7vw, 70px);
      color: #f0db35;
      text-shadow: 0 0 12px rgba(240,219,53,.4);
      font-family: Georgia, serif;
    }

    .categorias-grid {
      max-width: 1200px;
      margin: 0 auto;
      padding: 30px 20px 60px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 22px;
    }

    .categoria-card {
      border: 2px solid #f0d000;
      border-radius: 20px;
      padding: 10px;
      background: #000;
      transition: .2s;
    }

    .categoria-card:hover {
      transform: scale(1.03);
      box-shadow: 0 0 20px rgba(240,208,0,.3);
    }

    .categoria-card img {
      width: 100%;
      border-radius: 12px;
    }

    footer {
      padding: 25px;
      text-align: center;
      color: #aaa;
      border-top: 1px solid #111;
    }

    @media (max-width: 900px) {
      .categorias-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 500px) {
      .categorias-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

      <a href="index.html#contato">Contatos</a>

    </nav>
  </header>

  <!-- TÍTULO -->
  <section class="page-header">
    <h1>Categorias</h1>
  </section>

    <a class="categoria-card" href="drinks.html">

    </a>

    <a class="categoria-card" href="real-photos.html">

    <a class="categoria-card" href="games.html">

    <a class="categoria-card" href="garage.html">

    </a>

    <a class="categoria-card" href="musica.html">

    </a>

    <a class="categoria-card" href="rpg.html">
      <img src="RPG.png">

</body>
</html>
