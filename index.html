<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Categorias | Heeeph</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #000;
      color: #fff;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    .topbar {
      background: #050505;
      border-bottom: 2px solid #1a1a1a;
      padding: 12px 18px;
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .menu {
      display: flex;
      gap: 14px;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      font-size: 14px;
      text-transform: uppercase;
    }

    .menu a:hover {
      color: #f0d000;
    }

    .cart {
      border: 2px solid #c00;
      color: #fff;
      background: linear-gradient(180deg, #d40000, #820000);
      padding: 4px 8px;
      border-radius: 6px;
      font-weight: bold;
    }

    .page-header {
      text-align: center;
      padding: 40px 20px 20px;
      background: #000;
    }

    .page-header h1 {
      font-size: clamp(40px, 7vw, 76px);
      color: #f0db35;
      text-shadow: 0 0 16px rgba(240, 219, 53, 0.45);
      font-family: Georgia, serif;
      margin-bottom: 12px;
    }

    .page-header p {
      color: #ddd;
      font-size: 18px;
    }

    .categorias-grid {
      max-width: 1300px;
      margin: 0 auto;
      padding: 30px 20px 60px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 24px;
    }

    .categoria-card {
      display: block;
      background: #000;
      border: 2px solid #f0d000;
      border-radius: 22px;
      padding: 14px;
      box-shadow: 0 0 20px rgba(240, 208, 0, 0.18);
      transition: transform .2s ease, box-shadow .2s ease, border-color .2s ease;
    }

    .categoria-card:hover {
      transform: translateY(-4px) scale(1.02);
      box-shadow: 0 0 26px rgba(240, 208, 0, 0.35);
      border-color: #fff000;
    }

    .categoria-card img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 14px;
    }

    .voltar-area {
      text-align: center;
      padding: 0 20px 50px;
    }

    .voltar-btn {
      display: inline-block;
      background: linear-gradient(180deg, #111, #000);
      color: #fff000;
      border: 2px solid #f0d000;
      border-radius: 999px;
      padding: 12px 24px;
      font-weight: 900;
      text-transform: uppercase;
      box-shadow: 0 0 14px rgba(240,208,0,.25);
    }

    footer {
      padding: 28px 16px;
      text-align: center;
      color: #bbb;
      background: #020202;
      border-top: 2px solid #1b1b1b;
    }

    @media (max-width: 1100px) {
      .categorias-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (max-width: 800px) {
      .categorias-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 520px) {
      .menu {
        font-size: 12px;
        gap: 10px;
      }

      .categorias-grid {
        grid-template-columns: 1fr;
        gap: 18px;
      }

      .page-header p {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <nav class="menu">
      <a href="index.html#home">Home</a>
      <a href="categorias.html">Coleção</a>
      <a href="index.html#sobre">O que é Heeeph?</a>
      <a href="index.html#fotos">Fotos Reais</a>
      <a href="index.html#contato">Contatos</a>
      <a class="cart" href="#">🛒</a>
    </nav>
  </header>

  <section class="page-header">
    <h1>Categorias</h1>
    <p>Escolha uma categoria para ver as placas</p>
  </section>

  <section class="categorias-grid">
    <a class="categoria-card" href="bands.html">
      <img src="Bands.png" alt="Bands">
    </a>

    <a class="categoria-card" href="drinks.html">
      <img src="Drinks.png" alt="Drinks">
    </a>

    <a class="categoria-card" href="real-photos.html">
      <img src="Real Photos.png" alt="Real Photos">
    </a>

    <a class="categoria-card" href="games.html">
      <img src="Games.png" alt="Games">
    </a>

    <a class="categoria-card" href="garage.html">
      <img src="Garage.png" alt="Garage">
    </a>

    <a class="categoria-card" href="home-phrases.html">
      <img src="Home-Phrases.png" alt="Home Phrases">
    </a>

    <a class="categoria-card" href="infantil.html">
      <img src="Infantil.png" alt="Infantil">
    </a>

    <a class="categoria-card" href="motos.html">
      <img src="Motos.png" alt="Motos">
    </a>

    <a class="categoria-card" href="musica.html">
      <img src="Musica.png" alt="Música">
    </a>

    <a class="categoria-card" href="rpg.html">
      <img src="RPG.png" alt="RPG">
    </a>

    <a class="categoria-card" href="street.html">
      <img src="Street.png" alt="Street">
    </a>

    <a class="categoria-card" href="trip.html">
      <img src="TRIP.png" alt="Trip">
    </a>
  </section>

  <div class="voltar-area">
    <a class="voltar-btn" href="index.html">Voltar para a Home</a>
  </div>

  <footer>
    © 2026 Heeeph — Placas decorativas com personalidade.
  </footer>
</body>
</html>
