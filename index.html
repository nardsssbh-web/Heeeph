<script src="produtos.js"></script>
<script>
  function getCart() {
    const cart = JSON.parse(localStorage.getItem("heeeph_cart")) || [];
    return Array.isArray(cart) ? cart : [];
  }

  function updateCartCount() {
    const cart = getCart();
    const total = cart.reduce((acc, item) => {
      const qtd = Number(item.quantity || item.quantidade || 1);
      return acc + (isNaN(qtd) ? 1 : qtd);
    }, 0);

    const countEl = document.getElementById("cartCount");
    if (countEl) countEl.textContent = total;
  }

  /* =====================================================
     ALTERE SÓ ESTE BLOCO ABAIXO
     Coloque aqui os caminhos das 3 placas em destaque
  ====================================================== */
  const caminhosDestaque = [
    "placas/street/naipess.png",
    "placas/street/skatista.png",
    "placas/games/gta-sa.png"
  ];

  /* =====================================================
     NÃO MEXER DAQUI PRA BAIXO
  ====================================================== */

  function normalizarTexto(valor) {
    return String(valor || "")
      .trim()
      .replace(/^\.?\//, "")
      .replace(/\\/g, "/")
      .toLowerCase();
  }

  function obterTodosOsProdutos() {
    if (typeof PRODUTOS === "undefined") return [];

    return Object.values(PRODUTOS).flatMap(categoria => {
      if (!Array.isArray(categoria)) return [];
      return categoria;
    });
  }

  function montarProdutosDestaque() {
    const todos = obterTodosOsProdutos();

    return caminhosDestaque
      .map(caminho => {
        const caminhoNormalizado = normalizarTexto(caminho);

        return todos.find(produto =>
          normalizarTexto(produto.imagem) === caminhoNormalizado
        );
      })
      .filter(Boolean);
  }

  const produtosDestaque = montarProdutosDestaque();
  let currentIndex = 0;

  function renderCarouselPrincipal() {
    if (!produtosDestaque.length) {
      document.getElementById("nomeAtual").textContent = "Nenhuma placa encontrada";
      document.getElementById("precoAtual").textContent = "";
      document.getElementById("medidaAtual").textContent = "";
      document.getElementById("placaPrincipal").src = "";
      document.getElementById("placaPrincipal").alt = "Sem destaque";
      return;
    }

    const produto = produtosDestaque[currentIndex];

    document.getElementById("placaPrincipal").src = produto.imagem;
    document.getElementById("placaPrincipal").alt = produto.nome || "Placa em destaque";
    document.getElementById("medidaAtual").textContent = produto.medida || "";
    document.getElementById("nomeAtual").textContent = produto.nome || "";
    document.getElementById("precoAtual").textContent = produto.preco || "preço aqui";
  }

  function comprarProdutoDestaque() {
    if (!produtosDestaque.length) return;

    const produto = produtosDestaque[currentIndex];

    if (typeof adicionarAoCarrinho === "function") {
      localStorage.setItem("ultimaPagina", "index.html");
      adicionarAoCarrinho(produto.id);
      updateCartCount();
    }
  }

  document.getElementById("prevBtn").addEventListener("click", () => {
    if (!produtosDestaque.length) return;
    currentIndex = (currentIndex - 1 + produtosDestaque.length) % produtosDestaque.length;
    renderCarouselPrincipal();
  });

  document.getElementById("nextBtn").addEventListener("click", () => {
    if (!produtosDestaque.length) return;
    currentIndex = (currentIndex + 1) % produtosDestaque.length;
    renderCarouselPrincipal();
  });

  document.getElementById("btnComprar").addEventListener("click", comprarProdutoDestaque);
  document.getElementById("placaClick").addEventListener("click", comprarProdutoDestaque);

  updateCartCount();
  renderCarouselPrincipal();

  if (produtosDestaque.length > 1) {
    setInterval(() => {
      currentIndex = (currentIndex + 1) % produtosDestaque.length;
      renderCarouselPrincipal();
    }, 4000);
  }
</script>
