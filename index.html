<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Heeeph</title>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #000;
      color: #fff;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    /* MENU */
    .topbar {
      background: #050505;
      border-bottom: 2px solid #1a1a1a;
      padding: 12px;
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .menu {
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
      font-size: 14px;
      text-transform: uppercase;
    }

    .menu a:hover {
      color: #f0d000;
    }

    /* HERO */
    .hero {
      width: 100%;
      max-width: 1350px;
      height: 520px;
      margin: 0 auto;
      background: url('Banner Principal.png') center / contain no-repeat;
    }

    /* BANNER MEDIDAS */
    .banner-secundario {
      display: flex;
      justify-content: center;
      margin-top: 6px;
    }

    .banner-secundario img {
      width: 100%;
      max-width: 1350px;
      max-height: 160px;
      object-fit: contain;
    }

    /* DESTAQUE */
    .section {
      padding: 40px 20px;
      background: #000;
      text-align: center;
    }

    .section h2 {
      font-size: 40px;
      color: #f0db35;
      margin-bottom: 30px;
    }

    .destaque {
      display: grid;
      grid-template-columns: 80px 1fr 80px;
      align-items: center;
      max-width: 1100px;
      margin: auto;
    }

    .seta {
      font-size: 40px;
      cursor: pointer;
    }

    .produtos {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    .card {
      border: 2px solid #a56c15;
      padding: 10px;
      border-radius: 8px;
    }

    .card img {
      width: 100%;
      aspect-ratio: 3/4;
      object-fit: cover;
      border: 2px solid #fff;
    }

    /* BOTÃO CATEGORIAS */
    .categorias {
      text-align: center;
      padding: 30px;
    }

    .categorias img {
      max-width: 600px;
      width: 100%;
      cursor: pointer;
    }

    footer {
      text-align: center;
      padding: 20px;
      color: #aaa;
      border-top: 1px solid #111;
    }

    /* RESPONSIVO */
    @media (max-width: 800px) {
      .produtos {
        grid-template-columns: 1fr;
      }

      .destaque {
        grid-template-columns: 1fr;
      }

      .seta {
        display: none;
      }

      .hero {
        height: 250px;
      }
  @media (max-width: 600px) {

  .hero {
    height: 220px;
  }

  .banner-secundario img {
    max-height: 100px;
  }

  .produtos {
    grid-template-columns: 1fr;
  }

  .destaque {
    grid-template-columns: 1fr;
  }

  .seta {
    display: none;
  }

  .categorias img {
    max-width: 90%;
  }

  .menu {
    font-size: 12px;
    gap: 8px;
  }

}
  </style>
</head>

<body>

  <!-- MENU -->
  <header class="topbar">
    <nav class="menu">
      <a href="index.html">Home</a>
      <a href="categorias.html">Coleção</a>
      <a href="sobre.html">sobre</a>
      <a href="#">Contato</a>
    </nav>
  </header>

  <!-- BANNER PRINCIPAL -->
  <section class="hero"></section>

  <!-- BANNER MEDIDAS -->
  <section class="banner-secundario">
    <img src="Banner-Medidas.png">
  </section>

  <!-- DESTAQUE -->
  <section class="section">
    <h2>Destaque</h2>

    <div class="destaque">
      <div class="seta" onclick="voltar()">‹</div>

      <div class="produtos">
        <div class="card"><img id="p1"></div>
        <div class="card"><img id="p2"></div>
        <div class="card"><img id="p3"></div>
      </div>

      <div class="seta" onclick="avancar()">›</div>
    </div>
  </section>

  <!-- BOTÃO CATEGORIAS -->
  <section class="categorias">
    <a href="categorias.html">
      <img src="Acesse-Categorias.png">
    </a>
  </section>

  <footer>
    © 2026 Heeeph
  </footer>

  <!-- SCRIPT -->
  <script>
    const placas = [
      "Placa Skatista.png",
      "Placa roblox.png",
      "Placas Naipes.png",
      "Placa GTA.png"
    ];

    let i = 0;

    function atualizar() {
      document.getElementById("p1").src = placas[i % placas.length];
      document.getElementById("p2").src = placas[(i+1) % placas.length];
      document.getElementById("p3").src = placas[(i+2) % placas.length];
    }

    function avancar() {
      i++;
      atualizar();
    }

    function voltar() {
      i--;
      if(i < 0) i = placas.length - 1;
      atualizar();
    }

    atualizar();
  </script>

</body>
</html>
