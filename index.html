<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HEEEPH - Placas Decorativas</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --preto: #0b0b0b;
      --preto-2: #171717;
      --amarelo: #d8a12e;
      --amarelo-claro: #f0cd63;
      --bege: #efe7d9;
      --branco: #ffffff;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bege);
      color: #111;
      overflow-x: hidden;
    }

    img {
      max-width: 100%;
      display: block;
    }

    a {
      text-decoration: none;
    }

    .container {
      width: min(1200px, 94%);
      margin: 0 auto;
    }

    .header {
      position: sticky;
      top: 0;
      z-index: 2000;
      background: #000;
      box-shadow: 0 2px 14px rgba(0,0,0,0.28);
    }

    .header-container {
      min-height: 76px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .logo {
      color: #fff;
      font-size: 2.1rem;
      font-weight: 900;
      letter-spacing: 2px;
      white-space: nowrap;
    }

    .menu {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 30px;
      flex-wrap: wrap;
    }

    .menu a {
      color: #fff;
      font-size: 0.95rem;
      font-weight: 800;
      text-transform: uppercase;
      transition: 0.2s;
    }

    .menu a:hover {
      color: var(--amarelo-claro);
    }

    .cart-icon {
      color: #fff;
      font-size: 1.25rem;
      line-height: 1;
      white-space: nowrap;
    }

    .hero {
      background: linear-gradient(to bottom, #151515 0%, #1b1b1b 100%);
      padding: 22px 0 28px;
    }

    .banner-principal,
    .banner-medidas {
      width: min(1160px, 94%);
      margin: 0 auto;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 12px 30px rgba(0,0,0,0.25);
    }

    .banner-principal {
      margin-bottom: 22px;
    }

    .destaques {
      background: #1a1a1a;
      padding: 48px 0 58px;
    }

    .titulo-secao {
      color: #fff;
      text-align: center;
      font-size: 2rem;
      margin-bottom: 28px;
      letter-spacing: 1px;
    }

    .carousel-wrapper {
      width: min(1120px, 94%);
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
    }

    .carousel-btn {
      width: 58px;
      height: 58px;
      border: none;
      border-radius: 999px;
      background: var(--amarelo);
      color: #111;
      font-size: 1.8rem;
      font-weight: 900;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 18px rgba(0,0,0,0.28);
      transition: transform 0.2s ease;
      flex-shrink: 0;
    }

    .carousel-btn:hover {
      transform: scale(1.06);
    }

    .carousel-stage {
      flex: 1;
      max-width: 940px;
      min-height: 450px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      overflow: hidden;
    }

    .carousel-card {
      background: #262626;
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 14px 30px rgba(0,0,0,0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.35s ease;
    }

    .carousel-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #111;
    }

    .carousel-card.side {
      width: 215px;
      height: 305px;
      opacity: 0.78;
      transform: scale(0.92);
    }

    .carousel-card.center {
      width: 330px;
      height: 440px;
      opacity: 1;
      border: 3px solid rgba(240, 205, 99, 0.55);
    }

    .btn-categorias {
      margin-top: 30px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .btn-categorias a {
      display: block;
      width: min(600px, 95%);
    }

    .btn-categorias img {
      display: block;
      width: 100%;
      height: auto;
    }

    .espaco-livre {
      background: var(--bege);
      min-height: 320px;
    }

    .footer {
      background: #111;
      color: #fff;
      text-align: center;
      padding: 22px 14px;
      font-size: 0.95rem;
    }

    .whatsapp-fixo {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 3000;
      width: 240px;
      height: auto;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .whatsapp-fixo img {
      width: 100%;
      height: auto;
      filter: drop-shadow(0 8px 18px rgba(0,0,0,0.28));
    }

    @media (max-width: 1024px) {
      .header-container {
        flex-direction: column;
        padding: 14px 0;
      }

      .carousel-stage {
        min-height: 380px;
      }

      .carousel-card.side {
        width: 170px;
        height: 245px;
      }

      .carousel-card.center {
        width: 260px;
        height: 360px;
      }

      .whatsapp-fixo {
        width: 180px;
      }
    }

    @media (max-width: 700px) {
      .menu {
        gap: 14px;
      }

      .menu a {
        font-size: 0.82rem;
      }

      .carousel-wrapper {
        gap: 10px;
      }

      .carousel-stage {
        min-height: 315px;
        gap: 10px;
      }

      .carousel-card.side {
        width: 105px;
        height: 165px;
      }

      .carousel-card.center {
        width: 190px;
        height: 290px;
      }

      .carousel-btn {
        width: 44px;
        height: 44px;
        font-size: 1.3rem;
      }

      .whatsapp-fixo {
        width: 130px;
      }
    }

    @media (max-width: 430px) {
      .logo {
        font-size: 1.6rem;
      }

      .carousel-card.side {
        display: none;
      }

      .carousel-stage {
        min-height: 290px;
      }

      .carousel-card.center {
        width: 205px;
        height: 285px;
      }

      .whatsapp-fixo {
        width: 100px;
      }
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="container header-container">
      <div class="logo">HEEEPH</div>

      <nav class="menu">
        <a href="index.html">HOME</a>
        <a href="categorias.html">COLEÇÃO</a>
        <a href="sobre.html">O QUE É HEEEPH?</a>
        <a href="fotos-reais.html">FOTOS REAIS</a>
        <a href="https://wa.me/5511998302901" target="_blank">CONTATOS</a>
      </nav>

      <div class="cart-icon">🛒</div>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="banner-principal">
        <img src="banner/banner-principal.png" alt="Banner principal HEEEPH">
      </div>

      <div class="banner-medidas">
        <img src="banner/banner-medidas.png" alt="Banner com medidas das placas">
      </div>
    </section>

    <section class="destaques" id="destaques">
      <h2 class="titulo-secao">Destaque</h2>

      <div class="carousel-wrapper">
        <button class="carousel-btn" id="prevBtn" aria-label="Anterior">&#10094;</button>

        <div class="carousel-stage">
          <div class="carousel-card side" id="leftCard">
            <img src="" alt="Placa lateral esquerda">
          </div>

          <div class="carousel-card center" id="centerCard">
            <img src="" alt="Placa em destaque">
          </div>

          <div class="carousel-card side" id="rightCard">
            <img src="" alt="Placa lateral direita">
          </div>
        </div>

        <button class="carousel-btn" id="nextBtn" aria-label="Próximo">&#10095;</button>
      </div>

      <div class="btn-categorias">
        <a href="categorias.html">
          <img src="./botoes/categorias.png" alt="Categorias">
        </a>
      </div>
    </section>

    <section class="espaco-livre"></section>
  </main>

  <footer class="footer">
    <p>© 2026 HEEEPH - Placas Decorativas</p>
  </footer>

  <a class="whatsapp-fixo" href="https://wa.me/5511998302901" target="_blank" aria-label="WhatsApp">
    <img src="botoes/whatsapp.png" alt="WhatsApp">
  </a>

  <script>
    const imagens = [
      "placas/trip/meditando.png",
      "placas/street/naipess.png",
      "placas/street/skatista.png",
      "placas/games/gta-sa.png",
      "placas/games/roblox.png"
    ];

    let indexAtual = 2;

    const leftImg = document.querySelector("#leftCard img");
    const centerImg = document.querySelector("#centerCard img");
    const rightImg = document.querySelector("#rightCard img");

    function atualizarCarousel() {
      const total = imagens.length;
      const esquerda = (indexAtual - 1 + total) % total;
      const direita = (indexAtual + 1) % total;

      leftImg.src = imagens[esquerda];
      centerImg.src = imagens[indexAtual];
      rightImg.src = imagens[direita];
    }

    document.getElementById("prevBtn").addEventListener("click", () => {
      indexAtual = (indexAtual - 1 + imagens.length) % imagens.length;
      atualizarCarousel();
    });

    document.getElementById("nextBtn").addEventListener("click", () => {
      indexAtual = (indexAtual + 1) % imagens.length;
      atualizarCarousel();
    });

    atualizarCarousel();
  </script>

</body>
</html>
