<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Heeeph</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #000;
      color: #fff;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    img {
      display: block;
      max-width: 100%;
    }

    .topbar {
      background: #050505;
      border-bottom: 2px solid #1a1a1a;
      padding: 12px 16px;
      position: sticky;
      top: 0;
      z-index: 999;
    }

    .menu {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 18px;
      flex-wrap: wrap;
      font-size: 14px;
      text-transform: uppercase;
    }

    .menu a {
      transition: 0.2s ease;
    }

    .menu a:hover {
      color: #f0d000;
    }

    /* BANNER PRINCIPAL */
    .hero {
      width: 1000%;
      max-width: 1180px;
      margin: 0 auto;
      padding-top: 8px;
    }

    .hero img {
      width: 50%;
      height: auto;
      margin: 0 auto;
    }

    /* BANNER MEDIDAS */
    .banner-secundario {
      width: 100%;
      max-width: 1180px;
      margin: 12px auto 0;
    }

    .banner-secundario img {
      width: 100%;
      height: auto;
      margin: 0 auto;
    }

    /* DESTAQUE */
    .section {
      padding: 40px 20px;
      text-align: center;
      background: #000;
    }

    .section h2 {
      font-size: 38px;
      color: #f0db35;
      margin-bottom: 30px;
    }

    .destaque-carousel {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 140px 1fr 140px;
      align-items: center;
    }

    .seta {
      font-size: 90px;
      line-height: 1;
      cursor: pointer;
      user-select: none;
      color: #f0d000;
      text-align: center;
      transition: 0.2s ease;
    }

    .seta:hover {
      transform: scale(1.12);
    }

    .carousel-palco {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      min-height: 340px;
    }

    .mini-card {
      transition: 0.3s ease;
      opacity: 0.6;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #000;
    }

    .mini-card img {
      width: 170px;
      height: 240px;
      object-fit: contain;
      border: 2px solid #fff;
      border-radius: 10px;
      background: #000;
      padding: 4px;
    }

    .centro {
      transform: scale(1.15);
      opacity: 1;
      z-index: 2;
    }

    .centro img {
      width: 220px;
      height: 300px;
      object-fit: contain;
      background: #000;
    }

    /* BOTÃO CATEGORIAS */
    .categorias {
      text-align: center;
      padding: 20px 20px 40px;
    }

    .categorias img {
      max-width: 420px;
      width: 100%;
      margin: 0 auto;
    }

    /* WHATSAPP */
    .zap {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 110px;
      z-index: 999;
    }

    .zap img {
      width: 100%;
      height: auto;
    }

    footer {
      text-align: center;
      padding: 20px;
      color: #aaa;
      border-top: 1px solid #111;
      margin-top: 10px;
    }

    @media (max-width: 900px) {
      .hero,
      .banner-secundario {
        max-width: 92%;
      }

      .destaque-carousel {
        grid-template-columns: 90px 1fr 90px;
      }

      .seta {
        font-size: 60px;
      }

      .mini-card img {
        width: 120px;
        height: 180px;
      }

      .centro img {
        width: 170px;
        height: 240px;
      }

      .carousel-palco {
        min-height: 260px;
      }

      .zap {
        width: 85px;
      }
    }

    @media (max-width: 600px) {
      .menu {
        font-size: 12px;
        gap: 10px;
      }

      .section h2 {
        font-size: 30px;
      }

      .destaque-carousel {
        grid-template-columns: 1fr;
      }

      .seta {
        display: none;
      }

      .carousel-palco {
        gap: 10px;
        min-height: auto;
      }

      .mini-card img {
        width: 85px;
        height: 130px;
      }

      .centro img {
        width: 120px;
        height: 180px;
      }

      .categorias img {
        max-width: 280px;
      }

      .zap {
        width: 120px;
        bottom: 15px;
        right: 15px;
      }
    }
  </style>
</head>

<body>

  <header class="topbar">
    <nav class="menu">
      <a href="index.html">Home</a>
      <a href="categorias.html">Coleção</a>
      <a href="sobre.html">Sobre</a>
      <a href="https://wa.me/5511998302901" target="_blank">Contato</a>
    </nav>
  </header>

  <section class="hero">
    <img src="banner/banner-principal.png" alt="Banner Principal">
  </section>

  <section class="banner-secundario">
    <img src="banner/banner-medidas.png" alt="Banner Medidas">
  </section>

  <section class="section">
    <h2>Destaque</h2>

    <div class="destaque-carousel">
      <div class="seta" onclick="voltar()">❮</div>

      <div class="carousel-palco">
        <div class="mini-card">
          <img id="img-esquerda" src="placas/bandas/bls.png" alt="Placa esquerda" draggable="false">
        </div>

        <div class="mini-card centro">
          <img id="img-centro" src="placas/bandas/bs-master.png" alt="Placa destaque" draggable="false">
        </div>

        <div class="mini-card">
          <img id="img-direita" src="placas/bandas/bs-hell.png" alt="Placa direita" draggable="false">
        </div>
      </div>

      <div class="seta" onclick="avancar()">❯</div>
    </div>
  </section>

  <section class="categorias">
    <a href="categorias.html">
      <img src="botoes/buscar-produto.png" alt="Categorias">
    </a>
  </section>

  <footer>
    © 2026 Heeeph
  </footer>

  <script>
    const placas = [
      "placas/bandas/Angra.png",
      "placas/bandas/accept.png",
      "placas/bandas/acdc1.png",
      "placas/bandas/arp.png",
      "placas/bandas/bls.png",
      "placas/bandas/bs-caravan.png",
      "placas/bandas/bs-hell.png",
      "placas/bandas/bs-master.png",
      "placas/bandas/cannibal.png",
      "placas/bandas/cannibal1.png"
    ];

    let i = 0;

    function atualizar() {
      document.getElementById("img-centro").src = placas[i];
      document.getElementById("img-esquerda").src =
        placas[(i - 1 + placas.length) % placas.length];
      document.getElementById("img-direita").src =
        placas[(i + 1) % placas.length];
    }

    function avancar() {
      i = (i + 1) % placas.length;
      atualizar();
    }

    function voltar() {
      i = (i - 1 + placas.length) % placas.length;
      atualizar();
    }

    atualizar();

    document.addEventListener("contextmenu", function(e) {
      e.preventDefault();
    });
  </script>

  <a href="https://wa.me/5511998302901" target="_blank" class="zap">
    <img src="botoes/whatsapp.png" alt="WhatsApp">
  </a>

</body>
</html>
