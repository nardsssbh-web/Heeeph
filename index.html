<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Heeeph</title>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #000;
      color: #fff;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    /* TOPO */
    .topbar {
      background: #050505;
      border-bottom: 2px solid #1a1a1a;
      padding: 12px;
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .menu {
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
      font-size: 14px;
      text-transform: uppercase;
    }

    .menu a:hover {
      color: #f0d000;
    }

    /* BANNER PRINCIPAL */
    .hero {
      width: 100%;
      max-width: 1350px;
      height: 520px;
      margin: 0 auto;
      background: url('Banner Principal.png') center center / contain no-repeat;
      background-color: #000;
    }

    /* BANNER MEDIDAS */
    .banner-secundario {
      width: 100%;
      display: flex;
      justify-content: center;
      padding: 6px 8px 0;
      background: #000;
    }

    .banner-secundario img {
      width: 100%;
      max-width: 1350px;
      max-height: 150px;
      object-fit: contain;
      display: block;
    }

    /* SEÇÃO DESTAQUE */
    .section {
      padding: 40px 20px;
      background: #000;
      text-align: center;
    }

    .section h2 {
      font-size: 40px;
      color: #f0db35;
      margin-bottom: 30px;
      font-family: Georgia, serif;
      text-shadow: 0 0 10px rgba(240, 219, 53, 0.35);
    }

    .destaque {
      display: grid;
      grid-template-columns: 80px 1fr 80px;
      align-items: center;
      gap: 10px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .seta {
      font-size: 42px;
      cursor: pointer;
      color: #fff;
      user-select: none;
      transition: transform .2s ease, color .2s ease;
    }

    .seta:hover {
      color: #f0d000;
      transform: scale(1.08);
    }

    .produtos {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      align-items: stretch;
    }

    .card {
      border: 2px solid #a56c15;
      padding: 10px;
      border-radius: 10px;
      background: #000;
      box-shadow: 0 0 12px rgba(255, 166, 0, 0.16);
    }

    .card img {
      width: 100%;
      aspect-ratio: 3 / 4;
      object-fit: cover;
      border: 2px solid #fff;
      display: block;
      border-radius: 4px;
    }

    /* BOTÃO CATEGORIAS */
    .categorias {
      text-align: center;
      padding: 24px 20px 40px;
      background: #000;
    }

    .categorias img {
      width: 100%;
      max-width: 600px;
      display: inline-block;
      cursor: pointer;
    }

    footer {
      text-align: center;
      padding: 20px;
      color: #aaa;
      border-top: 1px solid #111;
      background: #000;
    }

    /* TABLET */
    @media (max-width: 900px) {
      .hero {
        height: 340px;
      }

      .banner-secundario img {
        max-height: 110px;
      }

      .destaque {
        grid-template-columns: 1fr;
      }

      .seta {
        display: none;
      }

      .produtos {
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
      }

      .card {
        padding: 8px;
      }

      .categorias img {
        max-width: 420px;
      }
    }

    /* CELULAR */
    @media (max-width: 600px) {
      .menu {
        font-size: 12px;
        gap: 8px;
      }

      .hero {
        height: 220px;
      }

      .banner-secundario img {
        max-height: 90px;
      }

      .section {
        padding: 28px 10px;
      }

      .section h2 {
        font-size: 30px;
        margin-bottom: 18px;
      }

      .destaque {
        grid-template-columns: 1fr;
      }

      .seta {
        display: none;
      }

      .produtos {
        display: flex;
        overflow-x: auto;
        gap: 12px;
        padding: 6px 6px 14px;
        scroll-snap-type: x mandatory;
        -webkit-overflow-scrolling: touch;
      }

      .produtos::-webkit-scrollbar {
        height: 6px;
      }

      .produtos::-webkit-scrollbar-thumb {
        background: #555;
        border-radius: 999px;
      }

      .card {
        min-width: 145px;
        max-width: 145px;
        flex: 0 0 auto;
        scroll-snap-align: center;
        padding: 6px;
        margin: 0;
      }

      .card img {
        width: 100%;
        aspect-ratio: 3 / 4;
        object-fit: cover;
      }

      .categorias {
        padding: 20px 16px 28px;
      }

      .categorias img {
        max-width: 260px;
        width: 90%;
      }
    }
  </style>
</head>

<body>

  <header class="topbar">
    <nav class="menu">
      <a href="index.html">Home</a>
      <a href="categorias.html">Coleção</a>
      <a href="sobre.html">Sobre</a>
      <a href="#">Contato</a>
    </nav>
  </header>

  <section class="hero"></section>

  <section class="banner-secundario">
    <img src="Banner-Medidas.png" alt="Banner de medidas">
  </section>

  <section class="section">
    <h2>Destaque</h2>

    <div class="destaque">
      <div class="seta" onclick="voltar()">‹</div>

      <div class="produtos">
        <div class="card">
          <img id="p1" alt="Produto 1">
        </div>
        <div class="card">
          <img id="p2" alt="Produto 2">
        </div>
        <div class="card">
          <img id="p3" alt="Produto 3">
        </div>
      </div>

      <div class="seta" onclick="avancar()">›</div>
    </div>
  </section>

  <section class="categorias">
    <a href="categorias.html">
      <img src="Acesse-Categorias.png" alt="Acesse categorias">
    </a>
  </section>

  <footer>
    © 2026 Heeeph
  </footer>

  <script>
    const placas = [
      "Placa Skatista.png",
      "Placa roblox.png",
      "Placas Naipes.png",
      "Placa GTA.png"
    ];

    let i = 0;

    function atualizar() {
      document.getElementById("p1").src = placas[i % placas.length];
      document.getElementById("p2").src = placas[(i + 1) % placas.length];
      document.getElementById("p3").src = placas[(i + 2) % placas.length];
    }

    function avancar() {
      i++;
      atualizar();
    }

    function voltar() {
      i--;
      if (i < 0) i = placas.length - 1;
      atualizar();
    }

    atualizar();
  </script>

</body>
</html>
