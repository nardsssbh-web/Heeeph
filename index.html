<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HEEEPH - Placas Decorativas</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --preto: #050505;
      --preto-suave: #101010;
      --dourado: #f0c400;
      --dourado-forte: #ffd700;
      --branco: #ffffff;
      --cinza: #d7d7d7;
      --sombra: rgba(0, 0, 0, 0.35);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background:
        linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.72)),
        url("banner/fundo.png") center top / cover no-repeat fixed;
      color: var(--branco);
      overflow-x: hidden;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    img {
      max-width: 100%;
      display: block;
    }

    button {
      font-family: inherit;
    }

    /* TOPO */
    .topo {
      position: sticky;
      top: 0;
      z-index: 1000;
      width: 100%;
      background: rgba(0, 0, 0, 0.96);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 8px 24px rgba(0,0,0,0.35);
    }

    .topo::after {
      content: "";
      display: block;
      width: 100%;
      height: 2px;
      background: linear-gradient(
        90deg,
        transparent 0%,
        rgba(240, 196, 0, 0.9) 8%,
        rgba(255, 210, 0, 0.15) 40%,
        rgba(255, 210, 0, 0.15) 60%,
        rgba(240, 196, 0, 0.9) 92%,
        transparent 100%
      );
    }

    .topo .wrap {
      max-width: 1500px;
      margin: 0 auto;
      padding: 18px 28px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .logo a {
      font-size: 34px;
      font-weight: 900;
      letter-spacing: 2px;
      color: #fff;
      white-space: nowrap;
    }

    .menu-area {
      display: flex;
      align-items: center;
      gap: 26px;
      margin-left: auto;
    }

    .menu {
      display: flex;
      align-items: center;
      gap: 32px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .menu a {
      color: #fff;
      font-size: 16px;
      font-weight: 800;
      text-transform: uppercase;
      transition: 0.2s ease;
      white-space: nowrap;
    }

    .menu a:hover,
    .menu a.ativo {
      color: var(--dourado);
    }

    .cart-link {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 52px;
      height: 52px;
      flex-shrink: 0;
    }

    .cart-link img {
      width: 44px;
      height: 44px;
      object-fit: contain;
    }

    .cart-count {
      position: absolute;
      top: -4px;
      right: -4px;
      min-width: 22px;
      height: 22px;
      padding: 0 6px;
      border-radius: 999px;
      background: var(--dourado);
      color: #000;
      font-size: 12px;
      font-weight: 900;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 3px 10px rgba(0,0,0,0.25);
    }

    /* ESTRUTURA */
    .site-bg {
      min-height: 100vh;
      padding-bottom: 80px;
    }

    .container {
      width: min(94%, 1500px);
      margin: 0 auto;
    }

    /* HERO */
    .hero {
      padding-top: 22px;
    }

    .hero-stack {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .banner-principal,
    .banner-secundario {
      width: 100%;
      overflow: hidden;
      border-radius: 26px;
      box-shadow:
        0 14px 34px rgba(0,0,0,0.38),
        inset 0 0 0 2px rgba(255, 196, 0, 0.08);
    }

    .banner-principal img,
    .banner-secundario img {
      width: 100%;
      height: auto;
      display: block;
    }

    .banner-secundario {
      max-width: 1180px;
      margin: 0 auto;
      border-radius: 18px;
    }

    /* BLOCO DESTAQUE */
    .home-vitrine {
      padding: 44px 0 20px;
    }

    .destaque-titulo {
      text-align: center;
      font-size: 34px;
      color: #fff;
      font-weight: 900;
      margin-bottom: 22px;
      text-shadow: 0 3px 12px rgba(0,0,0,0.35);
    }

    .vitrine-box {
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.88),
        rgba(10,10,10,0.86)
      );
      border-radius: 22px;
      padding: 0 0 34px;
      box-shadow:
        0 18px 40px rgba(0,0,0,0.35),
        inset 0 0 0 1px rgba(255,255,255,0.04);
      overflow: hidden;
    }

    .mini-topo {
      background: #000;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      position: relative;
    }

    .mini-topo::after {
      content: "";
      display: block;
      width: 100%;
      height: 2px;
      background: linear-gradient(
        90deg,
        transparent 0%,
        rgba(240, 196, 0, 0.9) 8%,
        rgba(255, 210, 0, 0.15) 40%,
        rgba(255, 210, 0, 0.15) 60%,
        rgba(240, 196, 0, 0.9) 92%,
        transparent 100%
      );
    }

    .mini-topo .wrap {
      max-width: 1500px;
      margin: 0 auto;
      padding: 14px 20px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .mini-logo a {
      font-size: 30px;
      font-weight: 900;
      letter-spacing: 1px;
      color: #fff;
      white-space: nowrap;
    }

    .mini-menu-area {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-left: auto;
    }

    .mini-menu {
      display: flex;
      align-items: center;
      gap: 28px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .mini-menu a {
      color: #fff;
      font-size: 14px;
      font-weight: 800;
      text-transform: uppercase;
      transition: 0.2s ease;
      white-space: nowrap;
    }

    .mini-menu a:hover,
    .mini-menu a.ativo {
      color: var(--dourado);
    }

    .mini-cart-link {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 38px;
      height: 38px;
      flex-shrink: 0;
    }

    .mini-cart-link img {
      width: 30px;
      height: 30px;
      object-fit: contain;
    }

    .mini-cart-count {
      position: absolute;
      top: -5px;
      right: -6px;
      min-width: 18px;
      height: 18px;
      padding: 0 5px;
      border-radius: 999px;
      background: var(--dourado);
      color: #000;
      font-size: 11px;
      font-weight: 900;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 3px 10px rgba(0,0,0,0.25);
    }

    .carousel-area {
      padding: 34px 22px 12px;
    }

    .carousel-wrap {
      display: grid;
      grid-template-columns: 90px 1fr 90px;
      align-items: center;
      gap: 18px;
      max-width: 1240px;
      margin: 0 auto;
    }

    .carousel-btn {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: none;
      background: #d9a62a;
      color: #000;
      font-size: 34px;
      font-weight: 900;
      cursor: pointer;
      margin: 0 auto;
      transition: transform 0.2s ease, filter 0.2s ease;
      box-shadow: 0 8px 18px rgba(0,0,0,0.25);
    }

    .carousel-btn:hover {
      transform: scale(1.06);
      filter: brightness(1.05);
    }

    .carousel-track {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 34px;
      min-height: 460px;
    }

    .destaque-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: 0.25s ease;
    }

    .destaque-card button {
      background: none;
      border: none;
      cursor: pointer;
    }

    .destaque-card img {
      display: block;
      border-radius: 18px;
      object-fit: cover;
      box-shadow: 0 12px 30px rgba(0,0,0,0.4);
      border: 2px solid rgba(255, 208, 0, 0.14);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      background: #111;
    }

    .destaque-card button:hover img {
      transform: translateY(-4px);
      box-shadow: 0 18px 34px rgba(0,0,0,0.48);
    }

    .destaque-card.side img {
      width: 180px;
      height: 255px;
    }

    .destaque-card.center img {
      width: 340px;
      height: 480px;
    }

    .destaque-info {
      text-align: center;
      margin-top: 12px;
    }

    .destaque-info h3 {
      font-size: 18px;
      color: #fff;
      margin-bottom: 4px;
      font-weight: 800;
    }

    .destaque-info p {
      font-size: 18px;
      color: var(--dourado);
      font-weight: 900;
    }

    .acoes-home {
      margin-top: 26px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 26px;
      flex-wrap: wrap;
    }

    .botao-categorias a,
    .zap-inline a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s ease;
    }

    .botao-categorias a:hover,
    .zap-inline a:hover {
      transform: scale(1.02);
    }

    .botao-categorias img {
      width: min(100%, 520px);
      height: auto;
      display: block;
    }

    .zap-inline img {
      width: 250px;
      max-width: 250px;
      height: auto;
      display: block;
    }

    footer {
      background: #000;
      color: #fff;
      text-align: center;
      padding: 26px 15px;
      font-size: 17px;
      margin-top: 40px;
    }

    /* WHATSAPP FLUTUANTE OPCIONAL */
    .whatsapp-fixo {
      position: fixed;
      right: 14px;
      bottom: 16px;
      z-index: 999;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      opacity: 0.92;
    }

    .whatsapp-fixo img {
      width: 56px;
      height: 56px;
      object-fit: contain;
    }

    /* RESPONSIVO */
    @media (max-width: 1200px) {
      .menu {
        gap: 22px;
      }

      .mini-menu {
        gap: 18px;
      }

      .destaque-card.center img {
        width: 280px;
        height: 400px;
      }

      .destaque-card.side img {
        width: 150px;
        height: 215px;
      }
    }

    @media (max-width: 980px) {
      .topo .wrap,
      .mini-topo .wrap {
        flex-direction: column;
        align-items: center;
        gap: 14px;
      }

      .menu-area,
      .mini-menu-area {
        width: 100%;
        justify-content: center;
        margin-left: 0;
        gap: 16px;
      }

      .menu,
      .mini-menu {
        gap: 18px;
      }

      .carousel-wrap {
        grid-template-columns: 70px 1fr 70px;
        gap: 8px;
      }

      .carousel-track {
        gap: 18px;
      }

      .destaque-card.center img {
        width: 230px;
        height: 330px;
      }

      .destaque-card.side img {
        width: 120px;
        height: 170px;
      }

      .acoes-home {
        flex-direction: column;
        align-items: center;
        gap: 18px;
      }
    }

    @media (max-width: 700px) {
      .logo a,
      .mini-logo a {
        font-size: 28px;
      }

      .menu,
      .mini-menu {
        gap: 14px;
      }

      .menu a,
      .mini-menu a {
        font-size: 13px;
      }

      .hero {
        padding-top: 12px;
      }

      .hero-stack {
        gap: 14px;
      }

      .banner-principal {
        border-radius: 18px;
      }

      .banner-secundario {
        width: 100%;
        border-radius: 14px;
      }

      .destaque-titulo {
        font-size: 28px;
      }

      .carousel-area {
        padding: 26px 10px 10px;
      }

      .carousel-wrap {
        grid-template-columns: 56px 1fr 56px;
      }

      .carousel-btn {
        width: 48px;
        height: 48px;
        font-size: 24px;
      }

      .carousel-track {
        gap: 10px;
        min-height: 320px;
      }

      .destaque-card.side {
        display: none;
      }

      .destaque-card.center img {
        width: 220px;
        height: 310px;
      }

      .botao-categorias img {
        width: min(100%, 430px);
      }

      .zap-inline img {
        width: 220px;
        max-width: 220px;
      }

      .whatsapp-fixo {
        display: none;
      }
    }
  </style>
</head>
<body>

  <header class="topo">
    <div class="wrap">
      <div class="logo">
        <a href="index.html">HEEEPH</a>
      </div>

      <div class="menu-area">
        <nav class="menu">
          <a href="index.html" class="ativo">HOME</a>
          <a href="categorias.html">COLEÇÃO</a>
          <a href="sobre.html">O QUE É HEEEPH?</a>
          <a href="fotos-reais.html">FOTOS REAIS</a>
          <a href="contatos.html">CONTATOS</a>
        </nav>

        <a href="carrinho.html" class="cart-link" aria-label="Abrir carrinho">
          <img src="botoes/botao-carrinho.png" alt="Carrinho">
          <span class="cart-count" id="cartCount">0</span>
        </a>
      </div>
    </div>
  </header>

  <main class="site-bg">
    <section class="hero">
      <div class="container">
        <div class="hero-stack">
          <div class="banner-principal">
            <img src="banner/banner-principal.png" alt="Banner principal HEEEPH">
          </div>

          <div class="banner-secundario">
            <img src="banner/banner-medidas.png" alt="Medidas das placas decorativas">
          </div>
        </div>
      </div>
    </section>

    <section class="home-vitrine">
      <div class="container">
        <h2 class="destaque-titulo">Destaque</h2>

        <div class="vitrine-box">
          <div class="mini-topo">
            <div class="wrap">
              <div class="mini-logo">
                <a href="index.html">HEEEPH</a>
              </div>

              <div class="mini-menu-area">
                <nav class="mini-menu">
                  <a href="index.html" class="ativo">HOME</a>
                  <a href="categorias.html">COLEÇÃO</a>
                  <a href="sobre.html">O QUE É HEEEPH?</a>
                  <a href="fotos-reais.html">FOTOS REAIS</a>
                  <a href="contatos.html">CONTATOS</a>
                </nav>

                <a href="carrinho.html" class="mini-cart-link" aria-label="Abrir carrinho">
                  <img src="botoes/botao-carrinho.png" alt="Carrinho">
                  <span class="mini-cart-count" id="miniCartCount">0</span>
                </a>
              </div>
            </div>
          </div>

          <div class="carousel-area">
            <div class="carousel-wrap">
              <button class="carousel-btn" id="prevBtn" aria-label="Anterior">&#8249;</button>

              <div class="carousel-track" id="carouselTrack"></div>

              <button class="carousel-btn" id="nextBtn" aria-label="Próximo">&#8250;</button>
            </div>

            <div class="acoes-home">
              <div class="botao-categorias">
                <a href="categorias.html">
                  <img src="botoes/categorias.png" alt="Categorias">
                </a>
              </div>

              <div class="zap-inline">
                <a href="https://wa.me/5511998302901" target="_blank" rel="noopener noreferrer" aria-label="Falar no WhatsApp">
                  <img src="botoes/whatsapp.png" alt="WhatsApp HEEEPH">
                </a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer>
    © 2026 HEEEPH - Placas Decorativas
  </footer>

  <a class="whatsapp-fixo" href="https://wa.me/5511998302901" target="_blank" rel="noopener noreferrer" aria-label="Falar no WhatsApp">
    <img src="botoes/whatsapp.png" alt="WhatsApp">
  </a>

  <script>
    function getCart() {
      return JSON.parse(localStorage.getItem('heeeph_cart')) || [];
    }

    function saveCart(cart) {
      localStorage.setItem('heeeph_cart', JSON.stringify(cart));
      updateCartCount();
    }

    function updateCartCount() {
      const cart = getCart();
      const total = cart.reduce((acc, item) => acc + (item.quantity || 1), 0);

      const countEl = document.getElementById('cartCount');
      const miniCountEl = document.getElementById('miniCartCount');

      if (countEl) countEl.textContent = total;
      if (miniCountEl) miniCountEl.textContent = total;
    }

    function addToCart(item) {
      const cart = getCart();
      const existingIndex = cart.findIndex(cartItem => cartItem.id === item.id);

      if (existingIndex > -1) {
        cart[existingIndex].quantity += 1;
      } else {
        cart.push({
          ...item,
          quantity: 1
        });
      }

      saveCart(cart);
      window.location.href = 'carrinho.html';
    }

    updateCartCount();

    const produtosDestaque = [
      {
        id: 'destaque-skatista',
        nome: 'Placa Skatista',
        preco: 'preço aqui',
        imagem: 'placas/street/skatista.png'
      },
      {
        id: 'destaque-naipes',
        nome: 'Placa Naipes',
        preco: 'preço aqui',
        imagem: 'placas/street/naipess.png'
      },
      {
        id: 'destaque-gta-sa',
        nome: 'Placa GTA SA',
        preco: 'preço aqui',
        imagem: 'placas/games/gta-sa.png'
      },
      {
        id: 'destaque-velho',
        nome: 'Placa Velho',
        preco: 'preço aqui',
        imagem: 'placas/motos/velho.png'
      },
      {
        id: 'destaque-beleza',
        nome: 'Placa Beleza',
        preco: 'preço aqui',
        imagem: 'placas/home-frases/beleza.png'
      }
    ];

    let currentIndex = 1;

    function renderCarousel() {
      const track = document.getElementById('carouselTrack');
      track.innerHTML = '';

      const total = produtosDestaque.length;
      const prevIndex = (currentIndex - 1 + total) % total;
      const nextIndex = (currentIndex + 1) % total;

      const itens = [
        { ...produtosDestaque[prevIndex], classe: 'side' },
        { ...produtosDestaque[currentIndex], classe: 'center' },
        { ...produtosDestaque[nextIndex], classe: 'side' }
      ];

      itens.forEach(produto => {
        const card = document.createElement('div');
        card.className = `destaque-card ${produto.classe}`;

        const button = document.createElement('button');
        button.type = 'button';
        button.addEventListener('click', () => addToCart(produto));

        const img = document.createElement('img');
        img.src = produto.imagem;
        img.alt = produto.nome;

        const info = document.createElement('div');
        info.className = 'destaque-info';
        info.innerHTML = `
          <h3>${produto.nome}</h3>
          <p>${produto.preco}</p>
        `;

        button.appendChild(img);
        card.appendChild(button);
        card.appendChild(info);
        track.appendChild(card);
      });
    }

    document.getElementById('prevBtn').addEventListener('click', () => {
      currentIndex = (currentIndex - 1 + produtosDestaque.length) % produtosDestaque.length;
      renderCarousel();
    });

    document.getElementById('nextBtn').addEventListener('click', () => {
      currentIndex = (currentIndex + 1) % produtosDestaque.length;
      renderCarousel();
    });

    renderCarousel();
  </script>

</body>
</html>
