<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CARRINHO | HEEEPH</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      background:
        linear-gradient(rgba(0,0,0,.10), rgba(0,0,0,.18)),
        url("banner/fundo.png") center top / cover no-repeat;
      background-color: #000;
      color: #fff;
      overflow-x: hidden;
      min-height: 100vh;
    }

    .topo {
      position: sticky;
      top: 0;
      z-index: 1000;
      width: 100%;
      background: #000;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .topo .wrap {
      max-width: 1600px;
      margin: 0 auto;
      padding: 16px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .logo a {
      font-size: 34px;
      font-weight: 900;
      letter-spacing: 2px;
      color: #fff;
      white-space: nowrap;
      text-decoration: none;
    }

    .menu-area {
      display: flex;
      align-items: center;
      gap: 28px;
      margin-left: auto;
      min-width: 0;
    }

    .menu {
      display: flex;
      align-items: center;
      gap: 34px;
      flex-wrap: wrap;
      justify-content: center;
      min-width: 0;
    }

    .menu a {
      color: #fff;
      font-size: 16px;
      font-weight: 800;
      text-transform: uppercase;
      transition: 0.2s ease;
      white-space: nowrap;
      text-decoration: none;
    }

    .menu a:hover,
    .menu a.ativo {
      color: #f0c400;
    }

    .cart-link {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 42px;
      height: 42px;
      flex-shrink: 0;
      text-decoration: none;
    }

    .cart-link img {
      width: 28px;
      height: 28px;
      object-fit: contain;
    }

    .cart-count {
      position: absolute;
      top: -5px;
      right: -6px;
      min-width: 20px;
      height: 20px;
      padding: 0 5px;
      border-radius: 999px;
      background: #f0c400;
      color: #000;
      font-size: 12px;
      font-weight: 900;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 3px 10px rgba(0,0,0,0.25);
    }

    .pagina {
      max-width: 1300px;
      margin: 0 auto;
      padding: 30px 20px 60px;
    }

    .titulo {
      text-align: center;
      margin-bottom: 30px;
    }

    .titulo h1 {
      font-size: 42px;
      color: #f0c400;
      margin-bottom: 10px;
    }

    .titulo p {
      font-size: 16px;
      color: #ddd;
    }

    .carrinho-box {
      display: grid;
      grid-template-columns: 1.6fr 0.9fr;
      gap: 28px;
      align-items: start;
    }

    .lista-carrinho,
    .resumo-carrinho {
      background: rgba(0,0,0,0.72);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 22px;
      padding: 22px;
      backdrop-filter: blur(4px);
    }

    .item-carrinho {
      display: grid;
      grid-template-columns: 110px 1fr auto;
      gap: 18px;
      align-items: center;
      padding: 16px 0;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .item-carrinho:last-child {
      border-bottom: none;
    }

    .item-img {
      width: 110px;
      height: 110px;
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px;
    }

    .item-img img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      display: block;
      border-radius: 10px;
    }

    .item-info h2 {
      font-size: 20px;
      margin-bottom: 8px;
      color: #fff;
    }

    .item-preco {
      font-size: 18px;
      font-weight: bold;
      color: #f0c400;
      margin-bottom: 12px;
    }

    .quantidade-area {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .quantidade-btn {
      width: 34px;
      height: 34px;
      border: none;
      border-radius: 10px;
      background: #f0c400;
      color: #000;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    .quantidade-btn:hover {
      background: #fff;
    }

    .quantidade-numero {
      min-width: 28px;
      text-align: center;
      font-size: 18px;
      font-weight: bold;
      color: #fff;
    }

    .subtotal-item {
      font-size: 18px;
      font-weight: bold;
      color: #fff;
      text-align: right;
    }

    .remover-btn {
      margin-top: 12px;
      border: none;
      background: transparent;
      color: #ff6b6b;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      padding: 0;
    }

    .remover-btn:hover {
      color: #fff;
    }

    .resumo-carrinho h3 {
      font-size: 26px;
      margin-bottom: 20px;
      color: #f0c400;
    }

    .linha-resumo {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 14px;
      font-size: 17px;
      color: #fff;
    }

    .linha-resumo.total {
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid rgba(255,255,255,0.12);
      font-size: 24px;
      font-weight: bold;
      color: #f0c400;
    }

    .acoes {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 24px;
    }

    .botao {
      display: inline-block;
      width: 100%;
      text-align: center;
      text-decoration: none;
      border: none;
      border-radius: 12px;
      padding: 14px 18px;
      font-size: 15px;
      font-weight: 900;
      text-transform: uppercase;
      cursor: pointer;
      transition: 0.2s;
    }

    .botao-amarelo {
      background: #f0c400;
      color: #000;
    }

    .botao-amarelo:hover {
      background: #fff;
    }

    .botao-escuro {
      background: #1b1b1b;
      color: #fff;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .botao-escuro:hover {
      background: #2a2a2a;
    }

    .vazio {
      text-align: center;
      padding: 60px 20px;
    }

    .vazio h2 {
      font-size: 30px;
      color: #f0c400;
      margin-bottom: 10px;
    }

    .vazio p {
      color: #ddd;
      margin-bottom: 24px;
      font-size: 16px;
    }

    .zap {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 999;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .zap img {
      width: 250px;
      max-width: 250px;
      height: auto;
      display: block;
    }

    @media (max-width: 980px) {
      .topo .wrap {
        flex-direction: column;
        align-items: center;
        gap: 14px;
      }

      .menu-area {
        width: 100%;
        justify-content: center;
        margin-left: 0;
        gap: 18px;
      }

      .menu {
        gap: 18px;
      }

      .carrinho-box {
        grid-template-columns: 1fr;
      }

      .zap img {
        width: 220px;
        max-width: 220px;
      }
    }

    @media (max-width: 700px) {
      .topo .wrap {
        flex-direction: row;
        align-items: center;
        justify-content: space-between;
        gap: 6px;
        padding: 10px 8px;
        flex-wrap: nowrap;
      }

      .logo a {
        font-size: 18px;
        letter-spacing: 1px;
      }

      .menu-area {
        width: auto;
        justify-content: flex-end;
        margin-left: auto;
        gap: 6px;
        flex-wrap: nowrap;
        min-width: 0;
        flex: 1 1 auto;
      }

      .menu {
        gap: 6px;
        flex-wrap: nowrap;
        justify-content: flex-end;
        overflow: hidden;
      }

      .menu a {
        font-size: 8px;
        letter-spacing: 0;
      }

      .cart-link {
        width: 30px;
        height: 30px;
      }

      .cart-link img {
        width: 21px;
        height: 21px;
      }

      .cart-count {
        top: -2px;
        right: -2px;
        min-width: 14px;
        height: 14px;
        font-size: 8px;
        padding: 0 4px;
      }

      .titulo h1 {
        font-size: 30px;
      }

      .titulo p {
        font-size: 14px;
      }

      .item-carrinho {
        grid-template-columns: 90px 1fr;
        gap: 14px;
      }

      .subtotal-item {
        grid-column: 1 / -1;
        text-align: left;
        padding-left: 0;
      }
    }

    @media (max-width: 520px) {
      .pagina {
        padding: 22px 14px 40px;
      }

      .lista-carrinho,
      .resumo-carrinho {
        padding: 16px;
        border-radius: 18px;
      }

      .item-img {
        width: 90px;
        height: 90px;
      }

      .item-info h2 {
        font-size: 17px;
      }

      .item-preco,
      .subtotal-item {
        font-size: 16px;
      }

      .linha-resumo {
        font-size: 15px;
      }

      .linha-resumo.total {
        font-size: 20px;
      }

      .zap {
        right: 10px;
        bottom: 10px;
      }

      .zap img {
        width: 170px;
        max-width: 170px;
      }
    }
  </style>
</head>
<body>

<header class="topo">
  <div class="wrap">
    <div class="logo">
      <a href="index.html">HEEEPH</a>
    </div>

    <div class="menu-area">
      <nav class="menu">
        <a href="index.html">HOME</a>
        <a href="categorias.html">COLEÇÃO</a>
        <a href="sobre.html">O QUE É HEEEPH?</a>
        <a href="fotos-reais.html">FOTOS REAIS</a>
      </nav>

      <a href="carrinho.html" class="cart-link" aria-label="Abrir carrinho">
        <img src="botoes/botao-carrinho.png" alt="Carrinho">
        <span class="cart-count" id="cartCount">0</span>
      </a>
    </div>
  </div>
</header>

<main class="pagina">
  <section class="titulo">
    <h1>SEU CARRINHO</h1>
    <p>Confira suas placas antes de finalizar o pedido.</p>
  </section>

  <section id="conteudoCarrinho"></section>
</main>

<a class="zap" href="https://wa.me/5511998302901" target="_blank" rel="noopener noreferrer">
  <img src="botoes/whatsapp.png" alt="WhatsApp">
</a>

<script src="produtos.js"></script>
<script>
  function precoParaNumero(preco) {
    if (!preco) return 0;
    if (preco === "preço aqui") return 0;

    return Number(
      preco
        .replace(/[^\d,.-]/g, "")
        .replace(/\./g, "")
        .replace(",", ".")
    ) || 0;
  }

  function formatarPreco(valor) {
    return valor.toLocaleString("pt-BR", {
      style: "currency",
      currency: "BRL"
    });
  }

  function updateCartCount() {
    const countEl = document.getElementById("cartCount");
    if (countEl && typeof contarItensCarrinho === "function") {
      countEl.textContent = contarItensCarrinho();
    }
  }

  function renderCarrinho() {
    const container = document.getElementById("conteudoCarrinho");

    if (typeof obterCarrinho !== "function") {
      container.innerHTML = `
        <div class="vazio">
          <h2>Erro no carrinho</h2>
          <p>O arquivo produtos.js não foi carregado corretamente.</p>
          <a class="botao botao-amarelo" href="categorias.html">VOLTAR PARA A COLEÇÃO</a>
        </div>
      `;
      return;
    }

    const carrinho = obterCarrinho();

    if (!carrinho.length) {
      container.innerHTML = `
        <div class="vazio">
          <h2>Carrinho vazio</h2>
          <p>Você ainda não adicionou nenhuma placa.</p>
          <a class="botao botao-amarelo" href="categorias.html">ESCOLHER PLACAS</a>
        </div>
      `;
      updateCartCount();
      return;
    }

    let totalItens = 0;
    let totalGeral = 0;

    const listaHtml = carrinho.map(item => {
      const quantidade = item.quantidade || 1;
      const precoUnitario = precoParaNumero(item.preco);
      const subtotal = precoUnitario * quantidade;

      totalItens += quantidade;
      totalGeral += subtotal;

      return `
        <div class="item-carrinho">
          <div class="item-img">
            <img src="${item.imagem}" alt="${item.nome}">
          </div>

          <div class="item-info">
            <h2>${item.nome}</h2>
            <div class="item-preco">${item.preco}</div>

            <div class="quantidade-area">
              <button class="quantidade-btn" onclick="diminuirQuantidade('${item.id}')">-</button>
              <span class="quantidade-numero">${quantidade}</span>
              <button class="quantidade-btn" onclick="aumentarQuantidade('${item.id}')">+</button>
            </div>

            <button class="remover-btn" onclick="excluirItem('${item.id}')">REMOVER</button>
          </div>

          <div class="subtotal-item">
            ${precoUnitario > 0 ? formatarPreco(subtotal) : item.preco}
          </div>
        </div>
      `;
    }).join("");

    const mensagemWhats = encodeURIComponent(
      "Olá! Tenho interesse nestas placas:\n\n" +
      carrinho.map(item => `- ${item.nome} | Qtd: ${item.quantidade || 1} | Valor: ${item.preco}`).join("\n") +
      "\n\nTotal de itens: " + totalItens +
      (totalGeral > 0 ? "\nTotal: " + formatarPreco(totalGeral) : "")
    );

    container.innerHTML = `
      <div class="carrinho-box">
        <div class="lista-carrinho">
          ${listaHtml}
        </div>

        <aside class="resumo-carrinho">
          <h3>Resumo</h3>

          <div class="linha-resumo">
            <span>Itens</span>
            <strong>${totalItens}</strong>
          </div>

          <div class="linha-resumo">
            <span>Subtotal</span>
            <strong>${totalGeral > 0 ? formatarPreco(totalGeral) : "preço aqui"}</strong>
          </div>

          <div class="linha-resumo">
            <span>Frete</span>
            <strong>A combinar</strong>
          </div>

          <div class="linha-resumo total">
            <span>Total</span>
            <strong>${totalGeral > 0 ? formatarPreco(totalGeral) : "preço aqui"}</strong>
          </div>

          <div class="acoes">
            <a class="botao botao-amarelo" href="https://wa.me/5511998302901?text=${mensagemWhats}" target="_blank" rel="noopener noreferrer">
              FINALIZAR PELO WHATSAPP
            </a>

            <a class="botao botao-escuro" href="categorias.html">
              CONTINUAR COMPRANDO
            </a>

            <button class="botao botao-escuro" onclick="limparCarrinho()">
              ESVAZIAR CARRINHO
            </button>
          </div>
        </aside>
      </div>
    `;

    updateCartCount();
  }

  function aumentarQuantidade(id) {
    alterarQuantidade(id, 1);
    renderCarrinho();
  }

  function diminuirQuantidade(id) {
    alterarQuantidade(id, -1);
    renderCarrinho();
  }

  function excluirItem(id) {
    removerDoCarrinho(id);
    renderCarrinho();
  }

  function limparCarrinho() {
    localStorage.removeItem("carrinho");
    renderCarrinho();
  }

  updateCartCount();
  renderCarrinho();
</script>

</body>
</html>
