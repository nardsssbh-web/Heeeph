<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HEEEPH - Categorias</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    :root{
      --gold:#f0c400;
      --gold2:#ffd84d;
      --text:#fff;
    }

    html{
      scroll-behavior:smooth;
      overflow-x:hidden;
    }

    body{
      font-family: Arial, Helvetica, sans-serif;
      color:var(--text);
      background:
        linear-gradient(rgba(0,0,0,.08), rgba(0,0,0,.22)),
        url("banner/fundo.png") center top / cover no-repeat fixed;
      background-color:#000;
      overflow-x:hidden;
      width:100%;
      max-width:100%;
    }

    a{
      text-decoration:none;
      color:inherit;
    }

    img{
      display:block;
      max-width:100%;
    }

    .container{
      width:min(94%, 1500px);
      margin:0 auto;
    }

    .topo{
      position:sticky;
      top:0;
      z-index:1000;
      background:rgba(0,0,0,.96);
      border-bottom:1px solid rgba(255,255,255,.05);
      box-shadow:0 8px 24px rgba(0,0,0,.35);
    }

    .topo::after{
      content:"";
      display:block;
      height:2px;
      background:linear-gradient(
        90deg,
        transparent 0%,
        rgba(240,196,0,.95) 10%,
        rgba(240,196,0,.12) 50%,
        rgba(240,196,0,.95) 90%,
        transparent 100%
      );
    }

    .topo .wrap{
      max-width:1500px;
      margin:0 auto;
      padding:16px 24px 14px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:22px;
    }

    .logo{
      flex:0 0 auto;
    }

    .logo a{
      font-size:34px;
      font-weight:900;
      letter-spacing:2px;
      color:#fff;
      white-space:nowrap;
    }

    .menu-area{
      display:flex;
      align-items:center;
      gap:22px;
      margin-left:auto;
      min-width:0;
    }

    .menu{
      display:flex;
      align-items:center;
      gap:28px;
      flex-wrap:wrap;
      justify-content:center;
      min-width:0;
    }

    .menu a{
      color:#fff;
      font-size:16px;
      font-weight:800;
      text-transform:uppercase;
      white-space:nowrap;
      transition:.2s ease;
    }

    .menu a:hover,
    .menu a.ativo{
      color:var(--gold);
    }

    .cart-link{
      position:relative;
      width:52px;
      height:52px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      flex-shrink:0;
    }

    .cart-link img{
      width:44px;
      height:44px;
      object-fit:contain;
    }

    .cart-count{
      position:absolute;
      top:-4px;
      right:-4px;
      min-width:22px;
      height:22px;
      padding:0 6px;
      border-radius:999px;
      background:var(--gold);
      color:#000;
      font-size:12px;
      font-weight:900;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .hero{
      padding:14px 0 10px;
    }

    .banner-wrap{
      position:relative;
      border-radius:22px;
      padding:6px;
      background:linear-gradient(145deg, rgba(110,69,22,.95), rgba(10,8,7,.96));
      box-shadow:0 14px 30px rgba(0,0,0,.34);
    }

    .banner-wrap::before{
      content:"";
      position:absolute;
      inset:3px;
      border-radius:18px;
      border:2px solid rgba(130,82,30,.85);
      box-shadow:inset 0 0 0 1px rgba(255,213,89,.10);
      pointer-events:none;
    }

    .banner{
      overflow:hidden;
      border-radius:16px;
      background:#111;
    }

    .banner img{
      width:100%;
      height:auto;
      display:block;
    }

    .categorias-area{
      padding:34px 0 34px;
    }

    .categorias-grid{
      display:grid;
      grid-template-columns:repeat(4, minmax(180px, 1fr));
      gap:32px 24px;
      align-items:stretch;
    }

    .categoria-card{
      position:relative;
      min-height:170px;
      border-radius:28px;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      background:transparent;
      transition:transform .18s ease, filter .18s ease;
    }

    .categoria-card:hover{
      transform:translateY(-4px);
      filter:brightness(1.08);
    }

    .categoria-card::before{
      content:"";
      position:absolute;
      width:88%;
      height:88%;
      border-radius:999px;
      background:
        radial-gradient(circle,
          rgba(255,255,255,.30) 0%,
          rgba(255,255,255,.16) 18%,
          rgba(255,216,77,.20) 34%,
          rgba(255,216,77,.09) 52%,
          rgba(255,216,77,.03) 70%,
          transparent 84%);
      filter:blur(18px);
      z-index:1;
      pointer-events:none;
    }

    .categoria-card a{
      position:relative;
      z-index:2;
      display:flex;
      align-items:center;
      justify-content:center;
      width:100%;
      height:100%;
      padding:8px;
    }

    .categoria-card img{
      width:230px;
      height:120px;
      max-width:100%;
      max-height:100%;
      object-fit:contain;
      object-position:center;
      filter:drop-shadow(0 8px 20px rgba(0,0,0,.48));
      transition:transform .18s ease;
    }

    .categoria-card:hover img{
      transform:scale(1.04);
    }

    .acoes-finais{
      margin-top:38px;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .voltar-home{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:320px;
      min-height:70px;
      padding:16px 28px;
      border-radius:999px;
      background:#050505;
      color:var(--gold2);
      font-family:'Oswald', sans-serif;
      font-size:24px;
      font-weight:700;
      letter-spacing:.5px;
      box-shadow:
        0 10px 24px rgba(0,0,0,.25),
        inset 0 0 0 1px rgba(255,208,0,.08);
      transition:transform .18s ease, filter .18s ease;
    }

    .voltar-home:hover{
      transform:translateY(-2px);
      filter:brightness(1.06);
    }

    footer{
      background:#000;
      color:#fff;
      text-align:center;
      padding:18px 15px;
      font-size:14px;
      margin-top:10px;
    }

    .whatsapp-fixo{
      position:fixed;
      right:14px;
      bottom:18px;
      z-index:999;
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }

    .whatsapp-fixo img{
      width:230px;
      max-width:230px;
      height:auto;
      display:block;
      filter:drop-shadow(0 6px 14px rgba(0,0,0,.35));
    }

    @media (max-width: 1100px){
      .categorias-grid{
        grid-template-columns:repeat(3, minmax(180px, 1fr));
      }
    }

    @media (max-width: 780px){
      html, body{
        overflow-x:hidden;
        width:100%;
        max-width:100%;
      }

      .topo{
        overflow:hidden;
      }

      .topo .wrap{
        flex-direction:row;
        align-items:center;
        justify-content:space-between;
        gap:8px;
        padding:10px 10px 10px;
        flex-wrap:nowrap;
      }

      .logo a{
        font-size:18px;
        letter-spacing:1px;
      }

      .menu-area{
        width:auto;
        margin-left:auto;
        gap:8px;
        flex-wrap:nowrap;
        min-width:0;
        flex:1 1 auto;
        justify-content:flex-end;
      }

      .menu{
        display:flex;
        align-items:center;
        justify-content:flex-end;
        gap:8px;
        flex-wrap:nowrap;
        min-width:0;
        overflow:hidden;
      }

      .menu a{
        font-size:9px;
        white-space:nowrap;
        letter-spacing:0;
      }

      .cart-link{
        width:34px;
        height:34px;
      }

      .cart-link img{
        width:26px;
        height:26px;
      }

      .cart-count{
        top:-2px;
        right:-2px;
        min-width:16px;
        height:16px;
        font-size:9px;
        padding:0 4px;
      }

      .banner-wrap{
        border-radius:18px;
        padding:5px;
      }

      .banner-wrap::before{
        inset:3px;
        border-radius:14px;
      }

      .banner{
        border-radius:12px;
      }

      .categorias-area{
        padding:22px 0 24px;
      }

      .categorias-grid{
        grid-template-columns:repeat(2, minmax(130px, 1fr));
        gap:20px 12px;
      }

      .categoria-card{
        min-height:132px;
        border-radius:20px;
      }

      .categoria-card::before{
        width:92%;
        height:92%;
        filter:blur(16px);
      }

      .categoria-card img{
        width:170px;
        height:88px;
      }

      .voltar-home{
        min-width:250px;
        min-height:58px;
        font-size:20px;
        padding:12px 22px;
      }

      .whatsapp-fixo{
        right:8px;
        bottom:8px;
      }

      .whatsapp-fixo img{
        width:175px;
        max-width:175px;
      }
    }

    @media (max-width: 480px){
      .topo .wrap{
        padding:8px 8px 8px;
        gap:6px;
      }

      .logo a{
        font-size:16px;
      }

      .menu{
        gap:6px;
      }

      .menu a{
        font-size:8px;
      }

      .cart-link{
        width:30px;
        height:30px;
      }

      .cart-link img{
        width:22px;
        height:22px;
      }

      .cart-count{
        min-width:14px;
        height:14px;
        font-size:8px;
      }

      .categorias-grid{
        grid-template-columns:1fr 1fr;
        gap:16px 10px;
      }

      .categoria-card{
        min-height:118px;
      }

      .categoria-card img{
        width:150px;
        height:78px;
      }

      .voltar-home{
        min-width:220px;
        min-height:52px;
        font-size:18px;
      }

      .whatsapp-fixo img{
        width:155px;
        max-width:155px;
      }
    }
  </style>
</head>
<body>

  <header class="topo">
    <div class="wrap">
      <div class="logo">
        <a href="index.html">HEEEPH</a>
      </div>

      <div class="menu-area">
        <nav class="menu">
          <a href="index.html">HOME</a>

  <main>

    </section>

    <section class="categorias-area">
      <div class="container">
        <div class="categorias-grid">

          <div class="categoria-card">
            <a href="bandas.html">

          <div class="categoria-card">

              <img src="botoes/bebidas.png" alt="Bebidas">
            </a>
          </div>

          <div class="categoria-card">
            <a href="fotos-reais.html">
              <img src="botoes/fotos-reais.png" alt="Fotos Reais">
            </a>
          </div>

          <div class="categoria-card">
            <a href="games.html">
              <img src="botoes/games.png" alt="Games">

          </div>

          <div class="categoria-card">
            <a href="garage.html">
              <img src="botoes/garage.png" alt="Garage">
            </a>
          </div>

          <div class="categoria-card">
            <a href="home-frases.html">
              <img src="botoes/home-frases.png" alt="Home e Frases">

          </div>

          <div class="categoria-card">

          <div class="categoria-card">

          <div class="categoria-card">

  </main>

  <footer>
    © 2026 HEEEPH - Placas Decorativas
  </footer>

  <a class="whatsapp-fixo" href="https://wa.me/5511998302901" target="_blank" rel="noopener noreferrer" aria-label="Falar no WhatsApp">
    <img src="botoes/whatsapp.png" alt="WhatsApp HEEEPH">
  </a>

  <script>
    function getCart() {
      return JSON.parse(localStorage.getItem('heeeph_cart')) || [];
    }

    function updateCartCount() {
      const cart = getCart();
      const total = cart.reduce((acc, item) => acc + (item.quantity || 1), 0);
      const countEl = document.getElementById('cartCount');
      if (countEl) countEl.textContent = total;
    }

    updateCartCount();
  </script>
</body>
</html>
