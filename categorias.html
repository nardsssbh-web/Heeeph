<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Categorias | Heeeph</title>

  <style>
    .zap {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 200px;
  z-index: 999;
}

.zap img {
  width: 100%;
}
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #000;
      color: #fff;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    .topbar {
      background: #050505;
      border-bottom: 2px solid #1a1a1a;
      padding: 12px;
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .menu {
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
      font-size: 14px;
      text-transform: uppercase;
    }

    .menu a:hover {
      color: #f0d000;
    }

    .categorias-grid {
      max-width: 1100px;
      margin: 0 auto;
      padding: 30px 20px 50px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 18px;
      justify-items: center;
    }

    .categoria-card {
      display: block;
      width: 100%;
      max-width: 220px;
      padding: 4px;
      transition: transform .2s ease;
    }

    .categoria-card:hover {
      transform: scale(1.03);
    }

    .categoria-card img {
      width: 100%;
      display: block;
      border-radius: 10px;
    }

    footer {
      text-align: center;
      padding: 20px;
      color: #aaa;
      border-top: 1px solid #111;
      margin-top: 20px;
    }

    @media (max-width: 900px) {
      .categorias-grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
      }

      .categoria-card {
        max-width: 180px;
      }
    }

    @media (max-width: 600px) {
      .menu {
        font-size: 12px;
        gap: 8px;
      }

      .categorias-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 14px;
        padding: 20px 14px 36px;
      }

      .categoria-card {
        max-width: 140px;
      }
    }
  </style>
</head>

<body>
