<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Categorias | Heeeph</title>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #000;
      color: #fff;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    .topbar {
      background: #050505;
      border-bottom: 2px solid #1a1a1a;
      padding: 12px;
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .menu {
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
      font-size: 14px;
      text-transform: uppercase;
    }

    .menu a:hover {
      color: #f0d000;
    }

    /* GRID */
    .categorias-grid {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 20px 60px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 22px;
    }

    .categoria-card {
      display: block;
      padding: 6px;
      transition: .2s;
    }

    .categoria-card:hover {
      transform: scale(1.03);
    }

    .categoria-card img {
      width: 100%;
      display: block;
      border-radius: 10px;
    }

    footer {
      text-align: center;
      padding: 20px;
      color: #aaa;
      border-top: 1px solid #111;
    }

    @media (max-width: 900px) {
      .categorias-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 500px) {
      .categorias-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

  <header class="topbar">
    <nav class="menu">
      <a href="index.html">Home</a>
      <a href="categorias.html">Coleção</a>
      <a href="#">Sobre</a>
      <a href="#">Contato</a>
    </nav>
  </header>

  <section class="categorias-grid">

    <a class="categoria-card" href="bands.html">
      <img src="Bands.png">
    </a>

    <a class="categoria-card" href="drinks.html">
      <img src="Drinks.png">
    </a>

    <a class="categoria-card" href="real-photos.html">
      <img src="Real Photos.png">
    </a>

    <a class="categoria-card" href="games.html">
      <img src="Games.png">
    </a>

    <a class="categoria-card" href="garage.html">
      <img src="Garage.png">
    </a>

    <a class="categoria-card" href="home-phrases.html">
      <img src="Home-Phrases.png">
    </a>

    <a class="categoria-card" href="infantil.html">
      <img src="Infantil.png">
    </a>

    <a class="categoria-card" href="motos.html">
      <img src="Motos.png">
    </a>

    <a class="categoria-card" href="musica.html">
      <img src="Musica.png">
    </a>

    <a class="categoria-card" href="rpg.html">
      <img src="RPG.png">
    </a>

    <a class="categoria-card" href="street.html">
      <img src="Street.png">
    </a>

    <a class="categoria-card" href="trip.html">
      <img src="TRIP.png">
    </a>

  </section>

  <footer>
    © 2026 Heeeph
  </footer>

</body>
</html>
