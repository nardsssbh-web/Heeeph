<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />

  <title>Bandas - HEEEPH</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --preto: #0b0b0b;
      --amarelo: #d8a12e;
      --amarelo-claro: #f0cd63;
      --bege: #efe7d9;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bege);
      color: #111;
      overflow-x: hidden;
    }

    img {
      max-width: 100%;
      display: block;
    }

    a {
      text-decoration: none;
    }

    .container {
      width: min(1200px, 94%);
      margin: 0 auto;
    }

    .header {
      position: sticky;
      top: 0;
      z-index: 2000;
      background: #000;
      box-shadow: 0 2px 14px rgba(0,0,0,0.28);
    }

    .header-container {
      min-height: 76px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .logo {
      color: #fff;
      font-size: 2.1rem;
      font-weight: 900;
      letter-spacing: 2px;
      white-space: nowrap;
    }

    .menu {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 30px;
      flex-wrap: wrap;
    }

    .menu a {
      color: #fff;
      font-size: 0.95rem;
      font-weight: 800;
      text-transform: uppercase;
      transition: 0.2s;
    }

    .menu a:hover,
    .menu a.ativo {
      color: var(--amarelo-claro);
    }

    .cart-icon {
      color: #fff;
      font-size: 1.25rem;
      line-height: 1;
      white-space: nowrap;
    }

    .hero-categoria {
      background: linear-gradient(to bottom, #151515 0%, #1b1b1b 100%);
      padding: 38px 0 30px;
      text-align: center;
    }

    .hero-categoria h1 {
      color: #fff;
      font-size: 2.4rem;
      margin-bottom: 12px;
      letter-spacing: 1px;
    }

    .hero-categoria p {
      color: #ddd;
      font-size: 1.05rem;
      max-width: 820px;
      margin: 0 auto;
      line-height: 1.7;
    }

    .galeria {
      padding: 48px 0 70px;
      background: var(--bege);
    }

    .grid-placas {
      width: min(1120px, 94%);
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 22px;
    }

    .placa {
      background: rgba(255,255,255,0.82);
      border-radius: 18px;
      padding: 12px;
      box-shadow: 0 8px 18px rgba(0,0,0,0.08);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .placa:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 24px rgba(0,0,0,0.12);
    }

    .placa img {
      width: 100%;
      aspect-ratio: 10 / 14;
      object-fit: cover;
      border-radius: 12px;
      background: #ddd;
    }

    .atalhos {
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-top: 36px;
    }

    .atalhos a {
      display: inline-block;
      background: #111;
      color: var(--amarelo-claro);
      padding: 14px 24px;
      border-radius: 999px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      transition: 0.2s ease;
    }

    .atalhos a:hover {
      transform: translateY(-2px);
    }

    .footer {
      background: #111;
      color: #fff;
      text-align: center;
      padding: 22px 14px;
      font-size: 0.95rem;
    }

    .whatsapp-fixo {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 3000;
      width: 240px;
      height: auto;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .whatsapp-fixo img {
      width: 100%;
      height: auto;
      filter: drop-shadow(0 8px 18px rgba(0,0,0,0.28));
    }

    @media (max-width: 1024px) {
      .header-container {
        flex-direction: column;
        padding: 14px 0;
      }

      .grid-placas {
        grid-template-columns: repeat(3, 1fr);
      }

      .whatsapp-fixo {
        width: 180px;
      }
    }

    @media (max-width: 700px) {
      .menu {
        gap: 14px;
      }

      .menu a {
        font-size: 0.82rem;
      }

      .grid-placas {
        grid-template-columns: repeat(2, 1fr);
      }

      .hero-categoria h1 {
        font-size: 2rem;
      }

      .whatsapp-fixo {
        width: 130px;
      }
    }

    @media (max-width: 430px) {
      .logo {
        font-size: 1.6rem;
      }

      .grid-placas {
        grid-template-columns: 1fr;
      }

      .whatsapp-fixo {
        width: 100px;
      }
    }
  </style>
